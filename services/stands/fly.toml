# ROOOT stands service — Fly.io app config.
#
# Deploy (from the REPO ROOT so the Docker build context includes ../../contracts):
#     flyctl deploy --config services/stands/fly.toml
#
# First-time setup:
#     flyctl apps create rooot-stands            # once; or edit `app` below
#     # TxLINE token as a runtime secret — NEVER in argv/logs/image. Read the
#     # file and pipe its fields in; the values never appear on the command line:
#     JWT=$(jq -r .jwt .secrets/txline-token.json)
#     APITOKEN=$(jq -r .apiToken .secrets/txline-token.json)
#     printf 'TXLINE_JWT=%s\nTXLINE_APITOKEN=%s\n' "$JWT" "$APITOKEN" | flyctl secrets import --config services/stands/fly.toml
#     # (the service reads TXLINE_TOKEN_FILE by default; on Fly, point it at a
#     #  file materialized from these secrets, or set TXLINE_TOKEN_FILE=/dev/null
#     #  and run replay mode. See docs/DATA.md + the service header. For live,
#     #  a tiny entrypoint that writes {jwt,apiToken} from the two secrets to a
#     #  tmpfile and exports TXLINE_TOKEN_FILE is the clean path — left to the
#     #  coordinator's deploy pass, since it depends on the live-vs-replay call.)
#
# Health check hits GET /health (server.ts). WebSocket upgrades share the port.

app = "rooot-stands"
primary_region = "iad"

# Jul 11 NOR-ENG wedge hardening: on a 256mb guest with no swap, kernel memory
# pressure can kill the ACCEPT PATH (new connections + health checks) while the
# process and its established sockets look alive - the exact live signature.
# Swap turns that cliff into graceful degradation. The in-process self-probe
# (server.ts armSelfProbe) is the code-side half of the same fix: it exits(1)
# on a dead accept path so the machine restart policy can heal in ~2 minutes.
swap_size_mb = 256

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Scarf-mint payer: the funded devnet keypair lives on the durable volume
  # (uploaded once via ssh stdin, never argv). Without this pointer the mint
  # code generates a fresh UNFUNDED key per deploy and Collect fails silently.
  MINT_DEVNET_KEYPAIR = "/data/mint-devnet.json"
  # Anchor durability (services/stands/src/server.ts armAnchorBackfill): sweep the
  # sentiment records on the volume at boot + every minute and re-anchor any whose
  # on-chain sig write-back was lost (confirmation timeout / suspend / OOM before
  # the fire-and-forget .then resolved). Opt-in so dev checks that boot the real
  # entrypoint never fire devnet anchors; ON here because prod holds the funded
  # relayer keypair and the durable /data volume the records live on.
  STANDS_ANCHOR_BACKFILL = "1"
  # Ingest mode is set per-deploy via `flyctl deploy -e` or fly secrets, e.g.
  #   REPLAY-driven demo:   TXLINE_ENABLE unset,  REPLAY_FILE + REPLAY_FIXTURE set
  #   LIVE ingest:          TXLINE_ENABLE=1,       TXLINE_FIXTURES=<id[,id]>
  # Left unset here so the same image can do either without a rebuild.

# Durable volume (Task 3 — restart/redeploy continuity): mounted at /data, the
# service's data-dir resolution (services/stands/src/snapshot.ts) picks this up
# automatically (STANDS_DATA_DIR unset -> /data if it exists + is writable).
# Requires `fly volumes create stands_data --region iad --size 1` first — the
# coordinator holds this section until that volume exists.
[mounts]
  source = "stands_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

# 512mb (was 256): the root cause of the Jul 10-12 OOM crashes was the service
# never evicting finished matches (registry + ~11 per-match caches grew across
# games until the guest was killed) - fixed in code (registry.sweepEvictions +
# onEvict, verified by check:mem-evict: heap returns to baseline). 512 is
# headroom on top of that fix, not the fix: it covers Node/tsx's ~90mb baseline
# so the guest never sits at the edge. Pinned here so `flyctl deploy` preserves
# the live scale-up (a machine scaled with `fly scale memory` reverts to this
# file's value on the next deploy).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
