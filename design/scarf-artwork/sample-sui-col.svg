<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- paper grain: sparse benday dots, print physics not filters -->
    <pattern id="grain" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.15" fill="#1A1815" opacity="0.055"/>
      <circle cx="10.5" cy="10.5" r="1.15" fill="#1A1815" opacity="0.04"/>
    </pattern>
    <!-- the weave: horizontal ribs + a soft warp beat -->
    <pattern id="ribs" width="10" height="8" patternUnits="userSpaceOnUse">
      <rect width="10" height="8" fill="rgba(0,0,0,0)"/>
      <rect y="0" width="10" height="3.4" fill="#1A1815" opacity="0.16"/>
      <rect y="5.4" width="10" height="1.2" fill="#FFFFFF" opacity="0.10"/>
    </pattern>
    <pattern id="warp" width="7" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" width="3.4" height="10" fill="#1A1815" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- PAPER: the mount -->
  <rect width="1024" height="1024" fill="#EDE6D6"/>
  <rect width="1024" height="1024" fill="url(#grain)"/>
  <rect x="30" y="30" width="964" height="964" fill="none" stroke="#1A1815" stroke-width="3"/>

  <!-- masthead, the programme voice -->
  <text x="512" y="200" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="44" letter-spacing="18" text-anchor="middle" fill="#1A1815">ROOOT</text>
  <text x="512" y="248" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="700" font-size="21" letter-spacing="7" text-anchor="middle" fill="#6B654F">FULL TIME · THE SCARF IS YOURS</text>

  <!-- CLOTH: fringe, two team fields, woven ribs over everything -->
  <path d="M 110 360 q -42 -5 -77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 383.38461538461536 q -42 5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 406.7692307692308 q -42 -5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 430.15384615384613 q -42 5 -77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 453.53846153846155 q -42 -5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 476.9230769230769 q -42 5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 500.30769230769226 q -42 -5 -77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 523.6923076923076 q -42 5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 547.0769230769231 q -42 -5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 570.4615384615385 q -42 5 -77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 593.8461538461538 q -42 -5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 617.2307692307693 q -42 5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 110 640.6153846153845 q -42 -5 -77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 110 664 q -42 5 -77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 914 360 q 42 -5 77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 383.38461538461536 q 42 5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 406.7692307692308 q 42 -5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 430.15384615384613 q 42 5 77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 453.53846153846155 q 42 -5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 476.9230769230769 q 42 5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 500.30769230769226 q 42 -5 77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 523.6923076923076 q 42 5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 547.0769230769231 q 42 -5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 570.4615384615385 q 42 5 77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 593.8461538461538 q 42 -5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 617.2307692307693 q 42 5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M 914 640.6153846153845 q 42 -5 77.28 -3" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/><path d="M 914 664 q 42 5 77.28 2" stroke="#3E3A31" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <g>
    <rect x="110" y="352" width="273" height="320" fill="#D52B1E"/>
    <rect x="641" y="352" width="273" height="320" fill="#bb8e08"/>
    <rect x="383" y="352" width="258" height="320" fill="#F2EBDB"/>
    <rect x="110" y="352" width="804" height="320" fill="url(#ribs)"/>
    <rect x="110" y="352" width="804" height="320" fill="url(#warp)"/>
    <!-- selvages; the gold line is the FT seal — gold only for the exceptional -->
    <rect x="110" y="345" width="804" height="7" fill="#1A1815"/>
    <rect x="110" y="672" width="804" height="7" fill="#1A1815"/>
    <rect x="110" y="679" width="804" height="5" fill="#B08D2F"/>
    <!-- team letters woven into each field -->
    <text x="246.5" y="546" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="104" letter-spacing="10" text-anchor="middle" fill="#F2EBDB" opacity="0.92">SUI</text>
    <text x="777.5" y="546" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="104" letter-spacing="10" text-anchor="middle" fill="#F2EBDB" opacity="0.92">COL</text>
    <!-- the score cartouche: the only victory representation -->
    <rect x="397" y="366" width="230" height="292" fill="none" stroke="#1A1815" stroke-width="3"/>
    <text x="512" y="554" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="118" text-anchor="middle" fill="#1A1815">1–2</text>
    <text x="512" y="406" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="700" font-size="13" letter-spacing="2.5" text-anchor="middle" fill="#6B654F">THE TOURNAMENT</text>
  </g>

  <!-- HALLMARK ROW: provenance whisper, punched on the mount -->
  <text x="512" y="790" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="800" font-size="27" letter-spacing="9" text-anchor="middle" fill="#1A1815">SUI 1–2 COL</text>
  <text x="512" y="836" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="700" font-size="20" letter-spacing="6" text-anchor="middle" fill="#6B654F">6 JUL 2026 · Nº 018</text>
  <text x="512" y="948" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="700" font-size="16" letter-spacing="5" text-anchor="middle" fill="#8A8268">WOVEN FROM THE MATCH · YOURS FOR GOOD</text>
</svg>