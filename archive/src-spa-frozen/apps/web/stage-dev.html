<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ROOOT · stage (dev)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #050708; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #stage-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

    /* DEV overlay — deliberately utilitarian; must never be mistaken for the product UI */
    #dev-ui { position: fixed; top: 0; left: 0; z-index: 10; padding: 10px; pointer-events: none; }
    #dev-ui .dev-panel { pointer-events: auto; display: inline-block;
      background: rgba(8,11,13,0.72); border: 1px solid rgba(233,228,214,0.14);
      border-radius: 8px; padding: 10px 12px; backdrop-filter: blur(6px);
      max-width: min(92vw, 520px); }
    .dev-badge { font: 600 10px ui-monospace, Menlo, monospace; letter-spacing: .18em;
      color: #39C6D8; margin-bottom: 8px; }
    .dev-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .dev-row.dev-jump { font: 500 11px ui-monospace, Menlo, monospace; color: #9FA096; }
    #dev-ui button, #dev-ui select {
      font: 500 12px ui-monospace, Menlo, monospace; color: #E9E4D6;
      background: rgba(233,228,214,0.06); border: 1px solid rgba(233,228,214,0.18);
      border-radius: 5px; padding: 4px 8px; cursor: pointer; }
    #dev-ui button:hover { background: rgba(233,228,214,0.14); }
    #dev-ui label { font: 500 11px ui-monospace, Menlo, monospace; color: #9FA096;
      display: flex; gap: 5px; align-items: center; }
    .dev-readout { font: 500 11px ui-monospace, Menlo, monospace; color: #C9C7BD;
      margin-top: 8px; line-height: 1.6; }
    .dev-readout .mkt { color: #E9E4D6; }
    .dev-readout .crd { color: #8CC7D6; }
    .dev-readout .faith { color: #FF9B3D; font-weight: 700; }
    .dev-note { font: 500 10px Georgia, serif; font-style: italic; color: #5C625B;
      margin-top: 8px; }
  </style>
</head>
<body>
  <canvas id="stage-canvas"></canvas>
  <div id="dev-ui"></div>
  <script type="module">
    import { boot } from '/src/stage/dev.ts';
    const canvas = document.getElementById('stage-canvas');
    const ui = document.getElementById('dev-ui');
    boot(canvas, ui);
  </script>
</body>
</html>
