<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F3ECDA" />
  <title>ROOOT</title>
  <style>
    /* the pre-boot sheet — newsprint + the pop-ball, flat spot ink, no webfonts
       (system grotesque until the app's type arrives; nothing here may glow) */
    html, body { margin: 0; height: 100%; background: #F3ECDA; color: #1A1A18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #stage { position: fixed; inset: 0; display: grid; place-items: center; }
    .mark { text-align: center; }
    .mark svg { display: block; margin: 0 auto 12px; }
    .mark .t { font-weight: 900; font-size: 26px; letter-spacing: .06em; }
  </style>
</head>
<body>
  <div id="stage">
    <div class="mark" aria-label="ROOOT is loading">
      <svg width="64" height="64" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="44" fill="#F3ECDA"/>
        <path d="M50 50 L50 6 A44 44 0 0 1 91.8 36.4 Z" fill="#C8504D"/>
        <path d="M50 50 L91.8 36.4 A44 44 0 0 1 75.9 85.6 Z" fill="#E5B431"/>
        <path d="M50 50 L75.9 85.6 A44 44 0 0 1 24.1 85.6 Z" fill="#C8504D"/>
        <path d="M50 50 L24.1 85.6 A44 44 0 0 1 8.2 36.4 Z" fill="#E5B431"/>
        <path d="M50 50 L8.2 36.4 A44 44 0 0 1 50 6 Z" fill="#C8504D"/>
        <g stroke="#1A1A18" stroke-width="5">
          <line x1="50" y1="50" x2="50" y2="6"/>
          <line x1="50" y1="50" x2="91.8" y2="36.4"/>
          <line x1="50" y1="50" x2="75.9" y2="85.6"/>
          <line x1="50" y1="50" x2="24.1" y2="85.6"/>
          <line x1="50" y1="50" x2="8.2" y2="36.4"/>
        </g>
        <circle cx="50" cy="50" r="44" fill="none" stroke="#1A1A18" stroke-width="7"/>
        <circle cx="50" cy="50" r="7" fill="#1A1A18"/>
      </svg>
      <div class="t">ROOOT</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
