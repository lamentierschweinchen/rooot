<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROOOT · relics (dev)</title>
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; min-height: 100%;
      /* Newsprint page (§ the harness must sit on Newsprint) */
      background: #F3ECDA; color: #1A1A18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .relic-header { padding: 18px 22px 6px; }
    .relic-badge { display: inline-block; font: 700 11px ui-monospace, Menlo, monospace;
      letter-spacing: .16em; text-transform: uppercase; color: #F3ECDA; background: #1A1A18;
      padding: 5px 10px; border-radius: 3px; }
    .relic-meta { font: 500 12px ui-monospace, Menlo, monospace; color: #5b5952;
      margin-top: 10px; letter-spacing: .02em; }
    .relic-grid { display: grid; gap: 26px; padding: 16px 22px 60px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); align-items: start; }
    .relic-cell { margin: 0; background: transparent; }
    .relic-canvas-wrap { position: relative; display: inline-block; width: 100%;
      /* a Press-Black mat behind each relic so the cream borders read */
      background: #1A1A18; padding: 10px; border-radius: 4px; box-sizing: border-box; }
    .relic-canvas { display: block; width: 100%; height: auto; border-radius: 2px; }
    .relic-dl { position: absolute; top: 16px; right: 16px;
      font: 700 12px ui-monospace, Menlo, monospace; letter-spacing: .06em;
      color: #1A1A18; background: #D6A33B; border: 2px solid #1A1A18; border-radius: 4px;
      padding: 5px 9px; cursor: pointer; }
    .relic-dl:hover { background: #F3ECDA; }
    .relic-cap { margin-top: 10px; }
    .relic-title { font: 800 15px 'Anybody', system-ui, sans-serif; letter-spacing: .06em; }
    .relic-sub { font: 500 11px ui-monospace, Menlo, monospace; color: #6b6960; margin-top: 3px; }
    .relic-stats { font: 500 11px ui-monospace, Menlo, monospace; color: #8a8880; margin-top: 4px; }
    .relic-error { font: 600 12px ui-monospace, Menlo, monospace; color: #C8504D;
      background: #1A1A18; padding: 12px; border-radius: 4px; white-space: pre-wrap; }
    .relic-report { display: none; }
  </style>
</head>
<body>
  <div id="relic-root"></div>
  <script type="module">
    import { boot } from '/src/relics/dev.ts';
    boot(document.getElementById('relic-root'));
  </script>
</body>
</html>
