<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>THE LOOM — woven live</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#E6DBC2">
<style>
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody.woff2) format('woff2');font-weight:400 700;font-display:swap}
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody900.woff2) format('woff2');font-weight:800 900;font-display:swap}
:root{--paper:#E6DBC2;--card:#F3ECDB;--ink:#1A1815;--sub:#8C8467;--gold:#C79A38;--cloth:#EAE1C8;--disp:'Anybody','Arial Black',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--paper);font-family:var(--disp);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.wrap{width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;padding:14px 12px 0}
.mast{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.mast .sc{font-weight:900;font-size:23px;white-space:nowrap}.mast .sc .h{color:#2049AA}.mast .sc .a{color:#C8504D}
.mast .rp{text-align:right;padding-left:10px;font-weight:700;font-size:9px;letter-spacing:.16em;color:var(--sub);display:flex;align-items:center;gap:6px}
.mast .rp .dot{width:6px;height:6px;border-radius:50%;background:#C8202A;animation:blink 1.4s infinite}   /* only a LIVE wire earns the lamp */
.mast .rp .dot.off{display:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.sub{font-weight:600;font-size:8.5px;letter-spacing:.13em;color:var(--sub);margin-bottom:10px}
/* embed mode — framed inside the composite: shed the chrome, the cloth fills */
body.embed .mast,body.embed .sub{display:none}
body.embed .wrap{padding:6px 8px 8px}
/* the loom is a live window: the cloth scrolls up as it weaves, the shuttle sits near the foot.
   overlays (GOOOL, the board) live on the FRAME, not in the scrolled cloth — they must never scroll away */
.loomwrap{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;border:1.5px solid var(--ink);box-shadow:0 12px 34px rgba(26,24,21,.13);background:var(--card)}
.loomv{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.loomv svg{display:block;width:100%;height:auto}
#shut rect{filter:drop-shadow(0 1px 1.5px rgba(26,24,21,.35))}   /* the shuttle sits proud of the cloth */
.gooool{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;z-index:6}
.gooool.on{animation:gool 2.6s cubic-bezier(.2,1,.3,1) both}
.gooool img{width:80%;max-width:330px;display:block}   /* the owner's chenille GOOOL patch — the eruption is a sticker slammed on the cloth */
@keyframes gool{0%{opacity:0;transform:scale(.4)}14%{opacity:1;transform:scale(1.12)}30%{transform:scale(1)}78%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
/* THE SHOOTOUT — the loom frame becomes a board when a match goes to penalties */
.loomv.pens{overflow:hidden}
/* headless mint capture (?keepsake=1&export=1): unclip the scroll chain so the whole sealed cloth lays out for one screenshot of #loomsvg */
.collectbar{flex:none;padding:9px 4px calc(11px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:6px}
.collectbar[hidden]{display:none}   /* the [hidden] attribute (unset only at seal()) must beat the display:flex above — else the Collect button shows mid-weave, before the cloth is sealed */
.collectbar .ck{font-family:var(--disp);font-weight:900;font-size:14px;letter-spacing:.06em;color:var(--card);background:var(--ink);border:none;padding:12px 26px;cursor:pointer;box-shadow:0 2px 0 rgba(26,24,21,.28)}
.collectbar .ck:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(26,24,21,.28)}
.collectbar .ck.collecting{opacity:.6;cursor:default}
.collectbar .ck.done{background:var(--gold);color:var(--ink);cursor:default}
.ckchain{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:11px;line-height:1.5;color:var(--sub);text-align:center;max-width:340px}
.ckchain a{color:#C8504D;text-decoration:none;border-bottom:1px solid rgba(200,80,77,.45)}
html.lexport .collectbar{display:none}   /* the keepsake capture is the cloth only — never the Collect chrome */
html.lexport,html.lexport body{height:auto;overflow:visible}
html.lexport .wrap{height:auto}
html.lexport .loomwrap{flex:none}
html.lexport .loomv{flex:none;overflow:visible}
html.lexport .ksSeal{animation:none;opacity:1}            /* the seal 'prints' 1.35s after render live — in a static capture, show it at once */
html.lexport .ksFrame{animation:none;stroke-dashoffset:0}  /* and the gold selvage fully woven, not mid-draw */
.board{position:absolute;inset:0;z-index:7;background:var(--card);display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px}
.board.on{display:flex}
.board.on.fold{animation:boardfold .7s ease-out .2s both}   /* the board lifts; the pressed cloth is beneath */
@keyframes boardfold{to{opacity:0;visibility:hidden}}
.board .bt{font-weight:900;font-size:17px;letter-spacing:.01em}
.board .bs{font-weight:700;font-size:8px;letter-spacing:.2em;color:var(--sub);margin:4px 0 28px}
.board .tally{display:flex;align-items:center;gap:16px;font-weight:900;font-size:46px;line-height:1;margin-bottom:30px}
.board .tally i{font-style:normal;font-size:22px;color:var(--sub);transform:translateY(-4px)}
.board .row{width:100%;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.board .row .tag{width:52px;font-weight:900;font-size:16px;letter-spacing:.01em;flex:none}
.board .kicks{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;min-height:16px}
.board .k{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--ink);box-shadow:0 1px 0 rgba(26,24,21,.18)}
.board .k.miss{background:transparent!important}
.board .k.ghost{border-style:dashed;opacity:.35;box-shadow:none}
.board .up{margin-top:14px;font-weight:700;font-size:8.5px;letter-spacing:.22em;color:var(--sub)}
.board .win{margin-top:26px;font-weight:900;font-size:26px;color:var(--gold);-webkit-text-stroke:1.6px var(--ink);text-align:center}
.board .win .ff{display:block;-webkit-text-stroke:0;color:var(--ink);font-size:13px;letter-spacing:.04em;margin-top:6px}
/* THE PRESSING — the gold thread runs the selvage, then the seal prints in one beat */
.ksSeal{animation:ksPrint .01s step-end 1.35s both}
.ksFrame{stroke-dasharray:100;stroke-dashoffset:100;animation:ksThread 1.5s ease-out .15s both}
@keyframes ksThread{to{stroke-dashoffset:0}}
@keyframes ksPrint{from{opacity:0}to{opacity:1}}
/* the hung scarf breathes — a slow, small breath + whisper of sway, so it reads as living cloth you
   could reach out and feel, not a flat plate. Off in export (the mint still) and reduced-motion. */
.loomv svg{transform-origin:50% 34%;animation:scarfBreathe 6.2s ease-in-out infinite;will-change:transform}
@keyframes scarfBreathe{0%,100%{transform:scale(1) rotate(-0.18deg)}50%{transform:scale(1.006) rotate(0.18deg)}}
html.lexport .loomv svg{animation:none;transform:none}
/* the printed tag a tapped stitch answers with appears in one beat — paper snaps, it never fades */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast"><span class="sc"><b class="h" id="hT">ARG</b> <span id="sc">0–0</span> <b class="a" id="aT">CPV</b></span><span class="rp"><span class="dot" id="liveDot"></span><span id="rp">REPLAY · 0′</span></span></div>
  <div class="sub">THE LOOM · THE MATCH, WOVEN</div>
  <div class="loomwrap"><div class="loomv" id="loomv"></div><div class="gooool" id="gooool"><img src="assets/gooool-v2.png" alt="GOOOL"></div><div class="board" id="board"></div></div>
  <div class="collectbar" id="collectbar" hidden>
    <button class="ck" id="loomKeep">COLLECT YOUR SCARF</button>
    <div class="ckchain" id="loomChain" hidden></div>
  </div>
</div>

<script src="plate/arg-cpv-data.js"></script>
<script>
(function(){
  'use strict';
  if(/embed=1/.test(location.search))document.body.classList.add('embed');
  var N=13;
  var COL={1:null,2:'#1A1815',3:'#C79A38',4:'#E5B431',5:'#C8504D',6:'#2E6A4E',7:'#F3ECDB',8:'#2049AA'};
  var d=function(x,y){return Math.hypot(x-6,y-6);};
  function S(rows,map){var g=[];for(var y=0;y<rows.length;y++){g[y]=[];for(var x=0;x<rows[y].length;x++)g[y][x]=map[rows[y][x]]||0;}return g;}
  function F(fn){var g=[];for(var y=0;y<N;y++){g[y]=[];for(var x=0;x<N;x++)g[y][x]=fn(x,y)||0;}return g;}
  var GRID={
    goal:F(function(x,y){var r=d(x,y);if(r>6)return 0;if(r>4.5)return 2;return 1;}),
    save:S(['.X.X.X.X.....','.X.X.X.X.....','.XXXXXXXX....','XXXXXXXXX....','XXXXXXXXX....','XXXXXXXXX....','.XXXXXXXX....','.XXXXXXXX....','.XXXXXXXX....','.########....','.########....','.............','.............'],{X:1,'#':2}),
    block:F(function(x,y){if(x<1||x>11||y<2||y>10)return 0;if(y%3===2)return 0;var row=Math.floor((y-3)/3),off=(row%2)?3:0;if((x+off)%6===0)return 0;return 1;}),
    miss:F(function(x,y){var r=d(x,y);return (r<=6&&r>=4.2)?1:0;}),
    freekick:S(['.............','.cc..cc..cc..','.............','.....222.....','....2bbb2....','....2bbb2....','....2bbb2....','.....222.....','.............','.............','.............','.............','.............'],{b:1,'2':2,c:3}),
    corner:S(['..#..........','..#XX........','..#XXXX......','..#XXXXXX....','..#XXXX......','..#XX........','..#..........','..#..........','..#..........','..#..........','..#..........','..#..........','.............'],{X:1,'#':2}),
    offside:S(['.#########...','.#YYYYRRRR#..','.#YYYYRRRR#..','.#YYYYRRRR#..','.#RRRRYYYY#..','.#RRRRYYYY#..','.#RRRRYYYY#..','.#########...','.#...........','.#...........','.#...........','.#...........','.#...........'],{Y:4,R:5,'#':2}),
    sub:S(['.....o.......','....ooo......','...ooooo.....','..ooooooo....','.....o.......','.....o.......','.............','.....r.......','.....r.......','..rrrrrrr....','...rrrrr.....','....rrr......','.....r.......'],{o:6,r:5}),
    injury:F(function(x,y){return (((x>=5&&x<=7)||(y>=5&&y<=7))&&Math.abs(x-6)<=5&&Math.abs(y-6)<=5)?5:0;}),
    yc:F(function(x,y){return (x>=4&&x<=8&&y>=1&&y<=11)?4:0;}),
    rc:F(function(x,y){return (x>=4&&x<=8&&y>=1&&y<=11)?5:0;}),
    var:F(function(x,y){if(x>=2&&x<=10&&y>=3&&y<=9){if(x===2||x===10||y===3||y===9)return 2;if(Math.abs(x-6)<=1&&Math.abs(y-6)<=1)return 3;return 0;}return 0;}),
    wood:F(function(x,y){if(y>=2&&y<=3&&x>=2&&x<=10)return 2;if((x>=2&&x<=3||x>=9&&x<=10)&&y>=2&&y<=9)return 2;return 0;}),
    shot:F(function(x,y){return d(x,y)<=2?1:0;})
  };
  function glyph(type,cx,cy,s,team,cloth){
    // cloth mode (marks stitched straight into the fabric): the stitches KEEP their colour
    // (owner: losing it hurts) — a bone halo-stitch beneath each one carries contrast on any
    // band, same-hue included, and a deep ink under-stitch seats it in the weave
    var g=GRID[type];if(!g)return '';var half=N*s/2,out='';
    var shC=cloth?'#00000052':'#00000026', shW=cloth?1.2:.7;
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){var v=g[y][x];if(!v)continue;var c=(v===1)?team:COL[v];if(!c)continue;
      var X=cx-half+x*s,Y=cy-half+y*s,m=Math.max(.6,s*.15),w=Math.max(1,s*.32);
      out+='<g stroke-linecap="round">';
      out+='<line x1="'+(X+m)+'" y1="'+(Y+m)+'" x2="'+(X+s-m)+'" y2="'+(Y+s-m)+'" stroke="'+shC+'" stroke-width="'+(w+shW)+'"/><line x1="'+(X+s-m)+'" y1="'+(Y+m)+'" x2="'+(X+m)+'" y2="'+(Y+s-m)+'" stroke="'+shC+'" stroke-width="'+(w+shW)+'"/>';
      if(cloth)out+='<line x1="'+(X+m)+'" y1="'+(Y+m)+'" x2="'+(X+s-m)+'" y2="'+(Y+s-m)+'" stroke="#F3ECDB" stroke-width="'+(w+1.5)+'" opacity="0.65"/><line x1="'+(X+s-m)+'" y1="'+(Y+m)+'" x2="'+(X+m)+'" y2="'+(Y+s-m)+'" stroke="#F3ECDB" stroke-width="'+(w+1.5)+'" opacity="0.65"/>';
      out+='<line x1="'+(X+m)+'" y1="'+(Y+m)+'" x2="'+(X+s-m)+'" y2="'+(Y+s-m)+'" stroke="'+c+'" stroke-width="'+w+'"/><line x1="'+(X+s-m)+'" y1="'+(Y+m)+'" x2="'+(X+m)+'" y2="'+(Y+s-m)+'" stroke="'+c+'" stroke-width="'+w+'"/></g>';
    }
    return out;
  }

  // ---------- the live model (accumulators the wire pushes into) ----------
  var HOME='#2049AA', AWAY='#C8504D', DRAW='#D0C29E';
  var M={ live:false, src:null, over:false, hTri:'ARG', aTri:'CPV', dur:126,
          belief:[], poss:{}, dgr:{1:{},2:{}}, events:[], score:[0,0],
          t:0, run:false, et:false, anchorMin:0, anchorMs:0 };
  var possSeed=null, dgrSeed=null;   // replay uses precomputed share series; live computes from counts
  var Q=new URLSearchParams(location.search);
  var DEMOQ=Q.get('demo')==='1';               // the baked walkthrough is a TAPE — it must never wear the live dot
  var KEEP=/keepsake/.test(location.search);   // the collectible: the whole match on one cloth, frozen at full time
  var EXPORT=KEEP&&(Q.get('export')==='1'||/(^|[#&])export/.test(location.hash));   // headless mint capture: settle instantly, unclip the scroll so the whole cloth lays out, then signal ready
  var KEEPID=KEEP?Q.get('match'):null;         // which kept cloth — resolved from an injected seed / #cloth= / the local rail (rooot.cloth.<id>)
  var KEEPEMPTY=false;                         // asked for a kept cloth that was never woven — say so, never substitute
  var SEALED=KEEP;                              // THE PRESSING — the weave has stopped and the cloth has sealed into the keepsake
  var PENS=null;                                // a shootout's verdict, once decided — printed into the seal
  var KS={editionNo:null, owner:null, call:null};   // the personal seam: bound when the fan's own record is woven in; honest-empty until the wire sends it
  var ROOT=null, CALLS=[];   // fan-personal: rooted side ('home'|'away') frames the selvage; CALLS = the call timeline knotted down that edge (real, resolved marks only)
  function esc(s){ return String(s).replace(/[<>&]/g,function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';}); }
  // masthead ink — the team's colour, darkened only if too light to read on the cream paper (e.g. COL yellow)
  function mastInk(hex){ if(!/^#[0-9a-fA-F]{6}$/.test(hex))return hex;
    var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16), lum=(0.299*r+0.587*g+0.114*b)/255;
    if(lum>0.55){ var k=0.55/lum; r=Math.round(r*k); g=Math.round(g*k); b=Math.round(b*k); }
    return 'rgb('+r+','+g+','+b+')'; }
  // pre-kickoff honesty — the fan's own local kickoff clock, small and plain (no timezone maths shown, just their phone's own time)
  function koClock(iso){ var dd=new Date(iso), hh=dd.getHours(), mi=dd.getMinutes();
    return (hh<10?'0':'')+hh+':'+(mi<10?'0':'')+mi; }
  // dyed thread, two ways — real cloth is never one flat colour: the warp runs a shade darker,
  // the weft a shade lighter, and the weave is the two beating together
  function shade(hex,f){ if(!/^#[0-9a-fA-F]{6}$/.test(hex))return hex;
    var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);
    if(f<=1){ r*=f; g*=f; b*=f; } else { var m=f-1; r+=(255-r)*m; g+=(255-g)*m; b+=(255-b)*m; }
    return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')'; }
  // one thread, one wobble — the bare warp below the edge and the warp seen through the weave
  // share this geometry, so the SAME thread runs the whole loom
  function warpJit(i){ var a=Math.sin(i*73.156)*43758.5453; a=(a-Math.floor(a))*1.7-0.85;
    var b=Math.sin(i*191.42)*43758.5453; b=(b-Math.floor(b))*1.7-0.85; return [a,b]; }

  // seed the ARG–CPV replay so the loom weaves it as a living demo when no wire is attached
  function seedReplay(){
    var R=window.MATCH; if(!R)return;
    HOME=R.home.ink; AWAY=R.away.ink; M.hTri=R.home.tri; M.aTri=R.away.tri;
    M.belief=R.belief.map(function(b){return {m:b[0],h:b[1],d:b[2],a:b[3]};});
    possSeed=R.poss.slice(); dgrSeed=R.danger.slice();
    M.events=R.events.map(function(e){return {m:e.m,s:e.s,t:e.t};});
    M.score=[0,0]; M.dur=(R.durationMin||123);
  }

  // ---------- window.__loom : the feed contract (coordinator's loom-adapter pushes here) ----------
  var dirty=true;
  window.__loom={
    live:function(){ M.live=true; M.src=M.src||(DEMOQ?'replay':'live'); possSeed=dgrSeed=null; M.belief=[]; M.poss={}; M.dgr={1:{},2:{}}; M.events=[]; M.score=[0,0]; M.t=0; goolQ=[]; goolFired={}; CALLS=[]; dirty=true; },  // fresh match: drop the seed's queued goals AND any prior calls (ROOT persists — it's the gate pick)
    mode:function(m){ if(m==='replay'||m==='live'){ M.src=m; dirty=true; } },   // the honest source signal (triage C1) — a tape says REPLAY, only the wire says LIVE
    clock:function(minute,running){ if(minute>=M.t)M.t=minute; M.run=running!==false; M.anchorMin=minute; M.anchorMs=(window.performance&&performance.now())||Date.now(); },
    odds:function(o){ M.belief.push({m:o.minute,h:o.pHome*100,d:o.pDraw*100,a:o.pAway*100}); M.belief.sort(function(x,y){return x.m-y.m;}); dirty=true; },
    pressure:function(minute,side,w){ var m=Math.floor(minute); M.dgr[side][m]=(M.dgr[side][m]||0)+(w||1); dirty=true; },
    possession:function(minute,side,w){ var m=Math.floor(minute); M.poss[m]=M.poss[m]||[0,0]; M.poss[m][side-1]+=(w||1); dirty=true; },
    tempo:function(){},
    event:function(e){ var t=mapKind(e); if(!t)return; var id=e.id, sd=(e.side===1?'h':e.side===2?'a':null);
      // REPLACE by wire id — shots/cards re-emit (unconfirmed→outcome, empty→named) and the
      // join-replay resends them; without this each re-emit stacked a duplicate mark.
      if(id){ for(var i=0;i<M.events.length;i++){ if(M.events[i].id===id){ M.events[i].t=t; M.events[i].m=e.minute; M.events[i].s=sd; if(e.name)M.events[i].n=e.name; dirty=true; return; } } }
      M.events.push({m:e.minute,s:sd,t:t,id:id,n:e.name||null}); dirty=true; if(t==='goal'&&!e.quiet)queueGool(e.minute,e.side); },  // quiet = join-replay goal: weave it, but don't erupt GOOOL for history
    score:function(a,c){ M.score=[a,c]; dirty=true; },
    teams:function(h,a){ if(h){ if(h.tri)M.hTri=h.tri; if(h.primary)HOME=h.primary; } if(a){ if(a.tri)M.aTri=a.tri; if(a.primary)AWAY=a.primary; } dirty=true; },
    // the wire's own word ends the weave: FULL_TIME fires THE PRESSING no matter the source
    // (live, tape, dry-run) — never inferred from M.live (the old !M.live gate left every
    // driven cloth unsealed at the whistle).
    phase:function(p){ if(!p)return; M.et=!!(p.phase==='EXTRA_TIME'||p.phase==='PENALTIES'); if(M.et&&!SEALED)M.dur=Math.max(M.dur,126);
      if(p.phase==='FULL_TIME')seal(); },
    chalkOff:function(side){ for(var i=M.events.length-1;i>=0;i--){ if(M.events[i].t==='goal' && M.events[i].s===(side===1?'h':'a')){ M.events[i].t='miss'; break; } } dirty=true; },
    // THE PRESSING — the wire seals the keepsake at full time and binds the fan's own record (edition, owner, their call)
    keepsake:function(k){ if(!k)return; if(k.editionNo!=null)KS.editionNo=k.editionNo; if(k.owner!=null)KS.owner=k.owner; if(k.call!=null)KS.call=k.call; if(k.sealed)seal(); dirty=true; },
    // the fan's own seam, live: the side they rooted (frames their selvage) and each call they make
    // (upsert by id; hit stays null until the feed resolves it → true/false). Real, resolved marks only.
    root:function(side){ if(side==='home'||side==='away'){ ROOT=side; dirty=true; } },
    call:function(c){ if(!c||c.m==null)return; var id=(c.id!=null?c.id:null);
      if(id!=null){ for(var i=0;i<CALLS.length;i++){ if(CALLS[i].id===id){ CALLS[i].m=c.m; if(c.hit!==undefined)CALLS[i].hit=c.hit; if(c.sub!=null)CALLS[i].sub=c.sub; dirty=true; return; } } }
      CALLS.push({m:c.m,k:c.k||'outcome',sub:c.sub||'',hit:(c.hit!=null?c.hit:null),id:id}); dirty=true; },
    // THE SHOOTOUT MODE — the loom BECOMES a board when a match goes to penalties.
    // The coordinator's adapter pushes the ordered state (both rows, running tally,
    // winner); the loom frame turns into the board while the mast keeps the 0–0 draw
    // that sent it there. Minimal wiring — design to elevate the drama (motion, the
    // held breath on the deciding kick). (owner, Jul 7: "we need a mode for it.")
    shootout:function(st){ renderBoard(st); }
  };

  }

  // ---------- per-frame: advance the edge, reveal, auto-scroll, fire GOOOL ----------
  var goolQ=[], goolFired={};
  function queueGool(minute,side){ goolQ.push({m:minute,side:side}); }
  function fireGool(){ var g=document.getElementById('gooool'); g.classList.remove('on'); void g.offsetWidth; g.classList.add('on'); }
  var REPLAY_SPEED=1.5;   // replay minutes per real second (whole match ~in 80s)
  var lastMs=(window.performance&&performance.now())||Date.now(), userScrolled=0;
  loomEl.addEventListener('scroll',function(){ userScrolled=Date.now(); },{passive:true});
  var unroll=(KEEP&&!KEEPEMPTY&&!EXPORT)?0:1;   // a kept scarf UNROLLS when opened — the reveal sweeps the sealed cloth down once (export skips it: whole cloth shown at once)
  function step(now){
    if(KEEPEMPTY)return;
    var dt=Math.min(0.3,(now-lastMs)/1000); lastMs=now;   // clamp only the rare huge gap (tab resurfacing); the live clock is anchor-based so this only paces the replay
    if(KEEP){ M.t=M.dur; }                                 // keepsake: frozen at full time
    else if(M.live){ if(M.run&&!SEALED){ M.t=Math.min(M.dur, M.anchorMin + ((now - M.anchorMs)/60000)); } }
    else if(!SEALED){ M.t=Math.min(M.dur, M.t + dt*REPLAY_SPEED); }   // replay weaves forward
    // replay: the score climbs as each goal weaves past the shuttle (live gets it from __loom.score)
    if(!M.live&&!KEEP){ var hh=0,aa=0; for(var gi=0;gi<goolQ.length;gi++){ if(M.t>=goolQ[gi].m){ if(goolQ[gi].side===1)hh++;else aa++; } } M.score=[hh,aa]; }
    if(!M.live && !SEALED && M.t>=M.dur-0.3)seal();        // the seed replay presses itself at its own full time; driven cloth seals off the wire (FULL_TIME)
    if(unroll<1)unroll=(REDMO||EXPORT)?1:Math.min(1,unroll+dt/1.15);
    // reveal + shuttle (cheap per-frame updates, no full re-render)
    var edgeY=ty(M.t), tt=now/1000;
    var rr=document.getElementById('revrect'); if(rr)rr.setAttribute('height',(edgeY*unroll).toFixed(1));
    var sl=document.getElementById('shutL'), sb=document.getElementById('shutB');
    // the loom RUNS: the shuttle travels the width laying picks, the working edge keeps a heartbeat,
    // the settle window shimmers — the cloth's own life, never the numbers' (motion invents no data)
    if(sl){ sl.setAttribute('y1',edgeY.toFixed(1)); sl.setAttribute('y2',edgeY.toFixed(1));
      sl.setAttribute('opacity',(BR.hb[0]+BR.hb[1]*Math.sin(tt*2*Math.PI/BR.hb[2])).toFixed(3)); }
    if(sb){ var tri; if(!BR.trav)tri=0.12; else { var ph=(tt%BR.trav)/BR.trav; tri=ph<0.5?ph*2:2-ph*2; }
      sb.setAttribute('x',(gx0+2+(grW-17)*tri).toFixed(1)); sb.setAttribute('y',(edgeY-3.5).toFixed(1)); }
    var sh=document.getElementById('shimm');
    if(sh){ sh.setAttribute('y',Math.max(top,edgeY-16.6).toFixed(1));
      sh.setAttribute('opacity',(BR.sh[0]+BR.sh[1]*Math.sin(tt*2*Math.PI/BR.sh[2])).toFixed(3)); }
    // auto-scroll to keep the weaving edge in the lower third (unless the fan just scrolled)
    if(!KEEP && !SEALED && Date.now()-userScrolled>2600){ var svgH=loomEl.scrollHeight, viewH=loomEl.clientHeight, edgePx=(edgeY/H())*svgH; loomEl.scrollTop=Math.max(0,edgePx-viewH*0.72); }
    // GOOOL when the edge reaches a goal
    goolQ.forEach(function(g,i){ if(!goolFired[i] && M.t>=g.m){ goolFired[i]=true; fireGool(); } });
    // masthead — the truth of the moment: KEPT · FULL TIME · LIVE (wire only) · REPLAY (any tape)
    document.getElementById('sc').textContent=M.score[0]+'–'+M.score[1];
    var _hT=document.getElementById('hT'),_aT=document.getElementById('aT');
    _hT.textContent=M.hTri; _aT.textContent=M.aTri; _hT.style.color=mastInk(HOME); _aT.style.color=mastInk(AWAY);
    var mm=Math.floor(M.t), lbl, dcls;
    // pre-kickoff honesty: the wire is connected (M.live/'live') but has produced no kickoff yet —
    // the clock has never been anchored running and still sits at 0'. LIVE · 0′ would claim a match
    // that hasn't started (Jul 10: it read that 40 minutes before kickoff). Read the wait instead,
    // straight off the manifest's own kickoff time; the instant the wire delivers a real running
    // clock this falls through to LIVE exactly as today — no separate "kickoff just happened" state.
    var preKO = M.live && M.src==='live' && !M.run && M.t<0.05 && FIXTURE && FIXTURE.kickoffUtc && Date.now()<Date.parse(FIXTURE.kickoffUtc);
    if(KEEP){ lbl='KEPT'; dcls='dot off'; }
    else if(M.over||SEALED){ lbl='FULL TIME · '+mm+'′'; dcls='dot off'; }
    else if(preKO){ lbl='KICKOFF '+koClock(FIXTURE.kickoffUtc)+' · MARKET OPEN'; dcls='dot off'; }
    else if(M.live&&M.src==='live'){ lbl='LIVE · '+mm+'′'; dcls='dot'; }
    else { lbl='REPLAY · '+mm+'′'; dcls='dot off'; }   // a replay is just a small true word — no lamp, no ceremony (owner)
    document.getElementById('rp').textContent=lbl;
    var _d=document.getElementById('liveDot'); if(_d.className!==dcls)_d.className=dcls;
    if(dirty){ dirty=false; renderCloth(); }
    // export-ready: the sealed cloth is drawn and fully unrolled — the mint capture waits on this,
    // then screenshots #loomsvg. 'empty' tells it the record was missing so it never mints a blank.
    if(KEEP && !M._ready && (KEEPEMPTY||unroll>=1)){ M._ready=true;
      document.documentElement.setAttribute('data-loom', KEEPEMPTY?'empty':'sealed');
      window.__loomKeepsake={ ready:true, empty:KEEPEMPTY, matchId:KEEPID||null }; }
  }
  function loop(now){ step(now); requestAnimationFrame(loop); }   // smooth while watched

  // boot: seed the replay (goes live the moment loom-adapter calls __loom.live())
  seedReplay();
  // the shared fixture manifest (script-order-independent, one fetch total — the SAME
  // window.__fixtureReady ||= fetch(...) idiom every adapter uses, so whichever script runs
  // first on the page makes the ONE network request). Two consumers below it: the /live
  // default's matchId, and the masthead's pre-kickoff honesty check in step().
  var FIXTURE=null;
  window.__fixtureReady = window.__fixtureReady || fetch('/fixture.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  window.__fixtureReady.then(function(fx){ FIXTURE=fx||null; }, function(){ FIXTURE=null; });
  // theme AFTER seedReplay (which sets the ARG-CPV demo) — from ?match= (loom-adapter drives
  // the DATA off the same param; this wire has no fixtureInfo, so theme locally like loom-proto).
  (function(){ var FX={ '18202701':['ARG','ARGENTINA','#75AADB','EGY','EGYPT','#CE1126'],
    '18202783':['SUI','SWITZERLAND','#D52B1E','COL','COLOMBIA','#FCD116'],
    '18193785':['USA','USA','#2A3B78','BEL','BELGIUM','#B4232B'], '18209181':['FRA','FRANCE','#0055A4','MAR','MOROCCO','#C1272D'],
    '18218149':['ESP','SPAIN','#AA151B','BEL','BELGIUM','#1A1A18'],
    '18213979':['NOR','NORWAY','#BA0C2F','ENG','ENGLAND','#CF081F'],
    '18222446':['ARG','ARGENTINA','#75AADB','SUI','SWITZERLAND','#D52B1E'],
    '18237038':['FRA','FRANCE','#0055A4','ESP','SPAIN','#AA151B'],
    '18241006':['ENG','ENGLAND','#CF081F','ARG','ARGENTINA','#75AADB'] };
    // only re-theme when a match is EXPLICITLY requested (live/coordinator); otherwise keep the
    // replay data's own teams so the standalone loom stays coherent (data ↔ teams matched).
    // adopt-#1 (docs/DATA-ARCHITECTURE.md §4): __themedLocally marks THIS in-page FX table as
    // the trusted override — loom-adapter.js's 'fixtureInfo' wire handler checks it and skips
    // re-theming, so a fixture already resolved here (possibly with a hand-picked colour that
    // differs slightly from sentiment/teams.ts, e.g. tonight's FRA blue) is never stomped by a
    // later-arriving wire message. A fixture this table DOESN'T carry leaves the flag unset, so
    // the wire's fixtureInfo (once the server emits it) is free to theme it — the fallback tier.
    function theme(id){ var f=id&&FX[id]; if(!KEEP && f){ window.__loom.teams({tri:f[0],name:f[1],primary:f[2]},{tri:f[3],name:f[4],primary:f[5]}); window.__loom.__themedLocally=true; } }
    // The baked replay feed is ENG-ARG (18241006). In replay mode (/live, /loom, ?replay=1) theme to
    // MATCH it and ignore ?match / the fixture manifest — otherwise the real ENG-ARG feed renders
    // under another team's colours (and mints under the wrong id). loom-adapter boots the same id,
    // so data ↔ teams stay locked together (Codex review). This supersedes the old /live→manifest
    // theming: /live now serves the baked replay, not a live socket, so its teams are fixed.
    var REPLAY=Q.get('replay')==='1'||location.pathname==='/live'||location.pathname==='/loom';
    if(REPLAY){ theme('18241006'); return; }
    var qMatch=Q.get('match');
    if(qMatch){ theme(qMatch); return; }   // ?match= wins for non-replay (live/coordinator) — instant, synchronous, never touches the manifest
  })();
  // THE KEPT CLOTH — resolve this match's own record; never substitute another match's.
  // The record is the sealed seed the cabinet unrolls; the mint pipeline re-renders it headlessly.
  // Order: (1) an injected seed — window.__loomKeepsakeRecord, set before boot by the capture
  // harness / server; (2) a self-contained URL — #cloth=<base64 json> (no server length limit,
  // survives a headless nav); (3) the local rail — localStorage rooot.cloth.<id> (the client unroll).
  function validRec(r){ return r && r.v===1 && r.home && r.belief; }
  function resolveKeptRecord(id){
    try{ if(validRec(window.__loomKeepsakeRecord))return window.__loomKeepsakeRecord; }catch(e){}
    var h=/[#&?]cloth=([^&]+)/.exec(location.hash||'');
    if(h){ try{ var s=atob(decodeURIComponent(h[1]).replace(/-/g,'+').replace(/_/g,'/'));
      var r=JSON.parse(s); if(validRec(r))return r; }catch(e){} }
    if(id){ try{ var lr=JSON.parse(localStorage.getItem('rooot.cloth.'+id)||'null'); if(validRec(lr))return lr; }catch(e){} }
    return null;
  }
  if(KEEP){
    if(EXPORT)document.documentElement.classList.add('lexport');
    var rec=resolveKeptRecord(KEEPID);
    if(rec){ loadRecord(rec); if(!KEEPID&&rec.fx)KEEPID=rec.fx; } else { KEEPEMPTY=true; }
    // a kept scarf is sealed — the wire may not weave into it (no adapter playback, ever);
    // only the binding seam stays open (edition Nº, owner, the proven call)
    Object.keys(window.__loom).forEach(function(k){ if(k!=='keepsake')window.__loom[k]=function(){}; });
    M.t=M.dur;
  }
  if(KEEPEMPTY){ document.getElementById('sc').textContent='—'; document.getElementById('hT').textContent=''; document.getElementById('aT').textContent='';
    document.getElementById('rp').textContent='KEPT'; document.getElementById('liveDot').className='dot off'; }
  // pre-queue the replay's goals so the demo erupts (live goals queue via __loom.event; a kept cloth never erupts)
  if(!M.live&&!KEEP)M.events.forEach(function(e){ if(e.t==='goal')queueGool(e.m,e.s==='h'?1:2); });
  renderCloth();
  // the fan's own marks — bind at boot (calls made before the loom loaded), again after the
  // adapter's live() reset settles, and whenever the terrace writes a fresh one (storage event
  // from the other tab). Idempotent (upsert by id) + KEEP-guarded; seal() does the final pull.
  bindPersonal(); setTimeout(bindPersonal,2500);
  window.addEventListener('storage',function(e){ if(!e)return; var k=e.key||''; if(k==='rooot.pass'||k.indexOf('rooot.calls.')===0)bindPersonal(); });
  requestAnimationFrame(loop);
  setInterval(function(){ if(document.hidden) step((window.performance&&performance.now())||Date.now()); }, 250);   // keep weaving when backgrounded (rAF pauses)

  // COLLECT — the woven scarf IS the keepsake (owner, Jul 16). The cloth already sealed locally at
  // full time (writeCloth), so it's safe the instant the whistle blows; Collect mints it to the fan's
  // own key via __seat.claim — one honest tap, a plain proof link, never a faked asset. No adapter/
  // no id → just the cabinet walk-home, never a fake claim.
  (function(){
    var btn=document.getElementById('loomKeep'), chain=document.getElementById('loomChain');
    if(!btn)return;
    function cabHref(){ var id=clothId(); return 'cabinet.html?from=keep'+(DEMOQ?'&demo=1':'&live=1'+(id?'&match='+encodeURIComponent(id):'')); }
    function msg(h){ if(chain){ chain.hidden=false; chain.innerHTML=h; } }
    btn.onclick=function(){
      if(btn.dataset.busy||btn.dataset.done)return;
      var id=clothId();
      if(!window.__seat||typeof window.__seat.claim!=='function'||!id){ msg('<a href="'+cabHref()+'">→ it’s in your cabinet</a>'); return; }
      btn.dataset.busy='1'; btn.classList.add('collecting'); btn.textContent='COLLECTING…'; msg('collecting your scarf — a few seconds');
      window.__seat.claim({matchId:id}).then(function(res){
        btn.dataset.busy=''; btn.classList.remove('collecting');
        if(res&&res.mint){ btn.dataset.done='1'; btn.classList.add('done'); btn.textContent='COLLECTED ✓';
          var url=res.mint.asset?('https://explorer.solana.com/address/'+encodeURIComponent(res.mint.asset)+'?cluster=devnet'):res.mint.txUrl;
          msg('permanently yours · <a href="'+url+'" target="_blank" rel="noopener">view it ↗</a> · <a href="'+cabHref()+'">cabinet</a>'); }
        else { btn.textContent='COLLECT YOUR SCARF'; msg('your seat is saved — your scarf is ready at full time · <a href="'+cabHref()+'">cabinet</a>'); }
      }).catch(function(){ btn.dataset.busy=''; btn.classList.remove('collecting'); btn.textContent='TRY AGAIN'; msg('<span style="color:#C8302A">something went wrong — try again</span> · <a href="'+cabHref()+'">cabinet</a>'); });
    };
  })();
  // (the legend is dead — the cloth answers a thumb, and the goal teaches the alphabet)
})();
</script>
<script src="loom-tape.js"></script>
<!-- The baked serverless replay feed — load ONLY the one this view needs (each ~2MB), synchronously
     before demo-feed.js reads its global. ?replay=1 (/live) → the sealed ENG-ARG fast-forward weave;
     ?demo=1 → the SUI-COL walkthrough. A plain live loom loads neither (saves the download). -->
<script>
(function(){ var q=new URLSearchParams(location.search);
  var replay = q.get('replay')==='1' || location.pathname==='/live' || location.pathname==='/loom';   // /live + /loom both rewrite to woven-loom — the replay signal rides the PATHNAME (the rewrite's query never reaches the client)
  var b = replay ? 'plate/demo-engarg.js' : (q.get('demo')==='1' ? 'plate/demo-suicol.js' : null);
  if (b) document.write('<scr'+'ipt src="'+b+'"></scr'+'ipt>');
})();
</script>
<script src="demo-feed.js"></script>
<script src="loom-adapter.js"></script>
<!-- SEAT — the loom's Collect mints the scarf, so it needs the full claim stack in the
     terrace's load-bearing order: nacl (window.nacl) → seat-passkey (window.seatPasskey)
     → seat-adapter (window.__seat/__album). Without nacl+passkey, __seat.claim() has no
     mechanism and rejects 'claim-unavailable' — the Collect would fail even once sealed. -->
<script src="plate/nacl.min.js"></script>
<script src="seat-passkey.js"></script>
<script src="seat-adapter.js"></script>
</body>
