<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>THE LOOM — woven live</title>
<style>
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody.woff2) format('woff2');font-weight:400 700;font-display:swap}
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody900.woff2) format('woff2');font-weight:800 900;font-display:swap}
:root{--paper:#E6DBC2;--card:#F3ECDB;--ink:#1A1815;--sub:#8C8467;--gold:#C79A38;--cloth:#EAE1C8;--disp:'Anybody','Arial Black',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--paper);font-family:var(--disp);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.wrap{width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;padding:14px 12px 0}
.mast{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.mast .sc{font-weight:900;font-size:23px;white-space:nowrap}.mast .sc .h{color:#2049AA}.mast .sc .a{color:#C8504D}
.mast .rp{text-align:right;padding-left:10px;font-weight:700;font-size:9px;letter-spacing:.16em;color:var(--sub);display:flex;align-items:center;gap:6px}
.mast .rp .dot{width:6px;height:6px;border-radius:50%;background:#C8202A;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.sub{font-weight:600;font-size:8.5px;letter-spacing:.13em;color:var(--sub);margin-bottom:10px}
/* embed mode — framed inside the composite: shed the chrome, the cloth fills */
body.embed .mast,body.embed .sub,body.embed .legend{display:none}
body.embed .wrap{padding:6px 8px 8px}
/* the loom is a live window: the cloth scrolls up as it weaves, the shuttle sits near the foot */
.loomv{position:relative;flex:1;min-height:0;background:var(--card);border:1.5px solid var(--ink);box-shadow:0 12px 34px rgba(26,24,21,.13);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.loomv svg{display:block;width:100%;height:auto;animation:clothbreath 5.5s ease-in-out infinite}
@keyframes clothbreath{0%,100%{filter:brightness(1)}50%{filter:brightness(1.035) saturate(1.03)}}
#shut{filter:drop-shadow(0 0 2.5px rgba(199,154,56,.7))}   /* the weaving edge glows — the cloth is being worked */
.gooool{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;z-index:6}
.gooool.on{animation:gool 2.6s cubic-bezier(.2,1,.3,1) both}
.gooool b{font-weight:900;font-size:52px;letter-spacing:-.02em;color:var(--gold);-webkit-text-stroke:2.5px #1A1815;text-shadow:0 3px 0 rgba(26,24,21,.25)}
@keyframes gool{0%{opacity:0;transform:scale(.4)}14%{opacity:1;transform:scale(1.12)}30%{transform:scale(1)}78%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;padding:9px 12px;background:var(--card);border:1.5px solid var(--ink)}
.legend .it{display:flex;align-items:center;gap:5px;font-weight:700;font-size:7.5px;letter-spacing:.09em;color:var(--sub)}
.legend .it svg{width:20px;height:20px;display:block}
.foot{font-weight:600;font-size:8px;letter-spacing:.04em;color:var(--sub);line-height:1.5;margin:8px 0 12px}
/* THE SHOOTOUT — the loom frame becomes a board when a match goes to penalties */
.loomv.pens{overflow:hidden}
.board{position:absolute;inset:0;z-index:7;background:var(--card);display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px}
.board.on{display:flex}
.board .bt{font-weight:900;font-size:17px;letter-spacing:.01em}
.board .bs{font-weight:700;font-size:8px;letter-spacing:.2em;color:var(--sub);margin:4px 0 28px}
.board .tally{display:flex;align-items:center;gap:16px;font-weight:900;font-size:46px;line-height:1;margin-bottom:30px}
.board .tally i{font-style:normal;font-size:22px;color:var(--sub);transform:translateY(-4px)}
.board .row{width:100%;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.board .row .tag{width:52px;font-weight:900;font-size:16px;letter-spacing:.01em;flex:none}
.board .kicks{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;min-height:16px}
.board .k{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--ink);box-shadow:0 1px 0 rgba(26,24,21,.18)}
.board .k.miss{background:transparent!important}
.board .k.ghost{border-style:dashed;opacity:.35;box-shadow:none}
.board .up{margin-top:14px;font-weight:700;font-size:8.5px;letter-spacing:.22em;color:var(--sub)}
.board .win{margin-top:26px;font-weight:900;font-size:26px;color:var(--gold);-webkit-text-stroke:1.6px var(--ink);text-align:center}
.board .win .ff{display:block;-webkit-text-stroke:0;color:var(--ink);font-size:13px;letter-spacing:.04em;margin-top:6px}
/* THE PRESSING — the seal + gold frame fade in as the cloth crystallises */
.ksSeal{animation:ksIn 1.2s ease-out .12s both}
.ksFrame{animation:ksIn 1.6s ease-out both}
@keyframes ksIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast"><span class="sc"><b class="h" id="hT">ARG</b> <span id="sc">0–0</span> <b class="a" id="aT">CPV</b></span><span class="rp"><span class="dot" id="liveDot"></span><span id="rp">REPLAY · 0′</span></span></div>
  <div class="sub">THE LOOM — THE MATCH WOVEN LIVE · MARKET IS THE GROUND · PLAY IS THE CORDS · EVENTS ARE STITCHED</div>
  <div class="loomv" id="loomv"><div class="gooool" id="gooool"><b>GOOOL</b></div><div class="board" id="board"></div></div>
  <div class="legend" id="legend"></div>
</div>

<script src="plate/arg-cpv-data.js"></script>
<script>
(function(){
  'use strict';
  if(/embed=1/.test(location.search))document.body.classList.add('embed');
  var N=13;
  var COL={1:null,2:'#1A1815',3:'#C79A38',4:'#E5B431',5:'#C8504D',6:'#2E6A4E',7:'#F3ECDB',8:'#2049AA'};
  var d=function(x,y){return Math.hypot(x-6,y-6);};
  function S(rows,map){var g=[];for(var y=0;y<rows.length;y++){g[y]=[];for(var x=0;x<rows[y].length;x++)g[y][x]=map[rows[y][x]]||0;}return g;}
  function F(fn){var g=[];for(var y=0;y<N;y++){g[y]=[];for(var x=0;x<N;x++)g[y][x]=fn(x,y)||0;}return g;}
  var GRID={
    goal:F(function(x,y){var r=d(x,y);if(r>6)return 0;if(r>4.5)return 2;return 1;}),
    save:S(['.X.X.X.X.....','.X.X.X.X.....','.XXXXXXXX....','XXXXXXXXX....','XXXXXXXXX....','XXXXXXXXX....','.XXXXXXXX....','.XXXXXXXX....','.XXXXXXXX....','.########....','.########....','.............','.............'],{X:1,'#':2}),
    block:F(function(x,y){if(x<1||x>11||y<2||y>10)return 0;if(y%3===2)return 0;var row=Math.floor((y-3)/3),off=(row%2)?3:0;if((x+off)%6===0)return 0;return 1;}),
    miss:F(function(x,y){var r=d(x,y);return (r<=6&&r>=4.2)?1:0;}),
    freekick:S(['.............','.cc..cc..cc..','.............','.....222.....','....2bbb2....','....2bbb2....','....2bbb2....','.....222.....','.............','.............','.............','.............','.............'],{b:1,'2':2,c:3}),
    corner:S(['..#..........','..#XX........','..#XXXX......','..#XXXXXX....','..#XXXX......','..#XX........','..#..........','..#..........','..#..........','..#..........','..#..........','..#..........','.............'],{X:1,'#':2}),
    offside:S(['.#########...','.#YYYYRRRR#..','.#YYYYRRRR#..','.#YYYYRRRR#..','.#RRRRYYYY#..','.#RRRRYYYY#..','.#RRRRYYYY#..','.#########...','.#...........','.#...........','.#...........','.#...........','.#...........'],{Y:4,R:5,'#':2}),
    sub:S(['.....o.......','....ooo......','...ooooo.....','..ooooooo....','.....o.......','.....o.......','.............','.....r.......','.....r.......','..rrrrrrr....','...rrrrr.....','....rrr......','.....r.......'],{o:6,r:5}),
    injury:F(function(x,y){return (((x>=5&&x<=7)||(y>=5&&y<=7))&&Math.abs(x-6)<=5&&Math.abs(y-6)<=5)?5:0;}),
    yc:F(function(x,y){return (x>=4&&x<=8&&y>=1&&y<=11)?4:0;}),
    rc:F(function(x,y){return (x>=4&&x<=8&&y>=1&&y<=11)?5:0;}),
    var:F(function(x,y){if(x>=2&&x<=10&&y>=3&&y<=9){if(x===2||x===10||y===3||y===9)return 2;if(Math.abs(x-6)<=1&&Math.abs(y-6)<=1)return 3;return 0;}return 0;}),
    wood:F(function(x,y){if(y>=2&&y<=3&&x>=2&&x<=10)return 2;if((x>=2&&x<=3||x>=9&&x<=10)&&y>=2&&y<=9)return 2;return 0;}),
    shot:F(function(x,y){return d(x,y)<=2?1:0;})
  };
  function glyph(type,cx,cy,s,team){
    var g=GRID[type];if(!g)return '';var half=N*s/2,out='';
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){var v=g[y][x];if(!v)continue;var c=(v===1)?team:COL[v];if(!c)continue;
      var X=cx-half+x*s,Y=cy-half+y*s,m=Math.max(.6,s*.15),w=Math.max(1,s*.32);
      out+='<g stroke-linecap="round"><line x1="'+(X+m)+'" y1="'+(Y+m)+'" x2="'+(X+s-m)+'" y2="'+(Y+s-m)+'" stroke="#00000026" stroke-width="'+(w+.7)+'"/><line x1="'+(X+s-m)+'" y1="'+(Y+m)+'" x2="'+(X+m)+'" y2="'+(Y+s-m)+'" stroke="#00000026" stroke-width="'+(w+.7)+'"/>';
      out+='<line x1="'+(X+m)+'" y1="'+(Y+m)+'" x2="'+(X+s-m)+'" y2="'+(Y+s-m)+'" stroke="'+c+'" stroke-width="'+w+'"/><line x1="'+(X+s-m)+'" y1="'+(Y+m)+'" x2="'+(X+m)+'" y2="'+(Y+s-m)+'" stroke="'+c+'" stroke-width="'+w+'"/></g>';
    }
    return out;
  }

  // ---------- the live model (accumulators the wire pushes into) ----------
  var HOME='#2049AA', AWAY='#C8504D', DRAW='#D0C29E';
  var M={ live:false, hTri:'ARG', aTri:'CPV', dur:126,
          belief:[], poss:{}, dgr:{1:{},2:{}}, events:[], score:[0,0],
          t:0, run:false, et:false, anchorMin:0, anchorMs:0 };
  var possSeed=null, dgrSeed=null;   // replay uses precomputed share series; live computes from counts
  var KEEP=/keepsake/.test(location.search);   // the collectible: the whole match on one cloth, frozen at full time
  var SEALED=KEEP;                              // THE PRESSING — the weave has stopped and the cloth has sealed into the keepsake
  var KS={editionNo:null, owner:null, call:null};   // the personal seam: bound when the fan's own record is woven in; honest-empty until the wire sends it
  function esc(s){ return String(s).replace(/[<>&]/g,function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';}); }
  // masthead ink — the team's colour, darkened only if too light to read on the cream paper (e.g. COL yellow)
  function mastInk(hex){ if(!/^#[0-9a-fA-F]{6}$/.test(hex))return hex;
    var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16), lum=(0.299*r+0.587*g+0.114*b)/255;
    if(lum>0.55){ var k=0.55/lum; r=Math.round(r*k); g=Math.round(g*k); b=Math.round(b*k); }
    return 'rgb('+r+','+g+','+b+')'; }

  // seed the ARG–CPV replay so the loom weaves it as a living demo when no wire is attached
  function seedReplay(){
    var R=window.MATCH; if(!R)return;
    HOME=R.home.ink; AWAY=R.away.ink; M.hTri=R.home.tri; M.aTri=R.away.tri;
    M.belief=R.belief.map(function(b){return {m:b[0],h:b[1],d:b[2],a:b[3]};});
    possSeed=R.poss.slice(); dgrSeed=R.danger.slice();
    M.events=R.events.map(function(e){return {m:e.m,s:e.s,t:e.t};});
    M.score=[0,0]; M.dur=(R.durationMin||123);
  }

  // ---------- window.__loom : the feed contract (coordinator's loom-adapter pushes here) ----------
  var dirty=true;
  window.__loom={
    live:function(){ M.live=true; possSeed=dgrSeed=null; M.belief=[]; M.poss={}; M.dgr={1:{},2:{}}; M.events=[]; M.score=[0,0]; M.t=0; dirty=true; },
    clock:function(minute,running){ if(minute>=M.t)M.t=minute; M.run=running!==false; M.anchorMin=minute; M.anchorMs=(window.performance&&performance.now())||Date.now(); },
    odds:function(o){ M.belief.push({m:o.minute,h:o.pHome*100,d:o.pDraw*100,a:o.pAway*100}); M.belief.sort(function(x,y){return x.m-y.m;}); dirty=true; },
    pressure:function(minute,side,w){ var m=Math.floor(minute); M.dgr[side][m]=(M.dgr[side][m]||0)+(w||1); dirty=true; },
    possession:function(minute,side){ var m=Math.floor(minute); M.poss[m]=M.poss[m]||[0,0]; M.poss[m][side-1]++; dirty=true; },
    tempo:function(){},
    event:function(e){ var t=mapKind(e); if(!t)return; var id=e.id, sd=(e.side===1?'h':e.side===2?'a':null);
      // REPLACE by wire id — shots/cards re-emit (unconfirmed→outcome, empty→named) and the
      // join-replay resends them; without this each re-emit stacked a duplicate mark.
      if(id){ for(var i=0;i<M.events.length;i++){ if(M.events[i].id===id){ M.events[i].t=t; M.events[i].m=e.minute; M.events[i].s=sd; dirty=true; return; } } }
      M.events.push({m:e.minute,s:sd,t:t,id:id}); dirty=true; if(t==='goal')queueGool(e.minute,e.side); },
    score:function(a,c){ M.score=[a,c]; dirty=true; },
    teams:function(h,a){ if(h){ if(h.tri)M.hTri=h.tri; if(h.primary)HOME=h.primary; } if(a){ if(a.tri)M.aTri=a.tri; if(a.primary)AWAY=a.primary; } dirty=true; },
    phase:function(p){ M.et=!!(p&&(p.phase==='EXTRA_TIME'||p.phase==='PENALTIES')); if(M.et)M.dur=126; },
    chalkOff:function(side){ for(var i=M.events.length-1;i>=0;i--){ if(M.events[i].t==='goal' && M.events[i].s===(side===1?'h':'a')){ M.events[i].t='miss'; break; } } dirty=true; },
    // THE PRESSING — the wire seals the keepsake at full time and binds the fan's own record (edition, owner, their call)
    keepsake:function(k){ if(!k)return; if(k.editionNo!=null)KS.editionNo=k.editionNo; if(k.owner!=null)KS.owner=k.owner; if(k.call!=null)KS.call=k.call; if(k.sealed)SEALED=true; dirty=true; },
    // THE SHOOTOUT MODE — the loom BECOMES a board when a match goes to penalties.
    // The coordinator's adapter pushes the ordered state (both rows, running tally,
    // winner); the loom frame turns into the board while the mast keeps the 0–0 draw
    // that sent it there. Minimal wiring — design to elevate the drama (motion, the
    // held breath on the deciding kick). (owner, Jul 7: "we need a mode for it.")
    shootout:function(st){ renderBoard(st); }
  };
  window.__loomSeek=function(m){ M.t=Math.max(0,Math.min(M.dur,m)); dirty=true; };   // dev — jump the replay clock (verification only)
  // build/refresh the shootout board (a stitched-knot board in the loom's palette)
  function renderBoard(st){
    var el=document.getElementById('board'), lv=document.getElementById('loomv');
    if(!el)return;
    if(!st||!st.active){ el.className='board'; if(lv)lv.className='loomv'; return; }
    el.className='board on'; if(lv)lv.className='loomv pens';
    function dots(kicks,color){ var o=''; for(var i=0;i<kicks.length;i++){ var k=kicks[i];
      o+='<span class="k'+(k.scored?'':' miss')+'" style="'+(k.scored?('background:'+color+';border-color:'+color):('border-color:'+color))+'"></span>'; }
      return o||'<span class="k ghost"></span>'; }
    var hN=M.hTri, aN=M.aTri, done=st.done&&st.winner;
    var tail = done ? '<div class="win">'+(st.winner==='home'?hN:aN)+' WIN <span class="ff">'+st.tally.home+'–'+st.tally.away+'</span></div>'
                    : '<div class="up">'+(st.order.length?'ON THE SPOT':'WAITING FOR THE FIRST KICK')+'</div>';
    el.innerHTML=
      '<div class="bt">THE SHOOTOUT</div>'+
      '<div class="bs">FROM THE SPOT · 0–0 AFTER EXTRA TIME</div>'+
      '<div class="tally"><b style="color:'+HOME+'">'+st.tally.home+'</b><i>–</i><b style="color:'+AWAY+'">'+st.tally.away+'</b></div>'+
      '<div class="row"><span class="tag" style="color:'+HOME+'">'+hN+'</span><span class="kicks">'+dots(st.home,HOME)+'</span></div>'+
      '<div class="row"><span class="tag" style="color:'+AWAY+'">'+aN+'</span><span class="kicks">'+dots(st.away,AWAY)+'</span></div>'+
      tail;
  }
  // __loom.event kind → the keepsake alphabet (offsides/freekicks/subs/injuries need the wire to widen the contract)
  function mapKind(e){ var k=e.kind, det=(e.type||e.detail||'').toString().toLowerCase();
    if(k==='goal')return 'goal';
    if(k==='shot')return det.indexOf('block')>=0?'block':det.indexOf('wood')>=0?'wood':det.indexOf('off')>=0?'miss':'save';
    if(k==='card')return det.indexOf('red')>=0?'rc':'yc';
    if(k==='corner')return 'corner';
    if(k==='sub')return 'sub';
    if(k==='injury')return 'injury';
    if(k==='freekick')return det.indexOf('offside')>=0?'offside':'freekick';
    if(k==='var')return 'var';
    return null; }

  // ---------- layout ----------
  var W=340, top=20, botpad=26, SEALPAD=104;
  var loomEl=document.getElementById('loomv');
  function H(){ return top+(SEALED?SEALPAD:botpad)+ M.dur*8.3; }   // ~8.3 px/min → the tall cloth; the sealed keepsake adds a foot for its seal
  var gx0=30, grW=W-gx0-12;
  function ty(m){ return top + m*8.3; }
  function gx(p){ return gx0+grW*(p/100); }
  function interp(arr,m,k){ if(!arr.length)return 50; if(m<=arr[0][0])return arr[0][k]; var L=arr.length; if(m>=arr[L-1][0])return arr[L-1][k];
    for(var i=1;i<L;i++){if(arr[i][0]>=m){var a=arr[i-1],b=arr[i],tt=(m-a[0])/((b[0]-a[0])||1);return a[k]+(b[k]-a[k])*tt;}} return arr[L-1][k]; }

  // possession / danger as a home-share series [[m,share]] up to `upto`, from the seed (replay) or the live counts
  function shareSeries(seed,counts,upto){
    if(seed)return seed.filter(function(p){return p[0]<=upto+0.5;});
    var out=[],keys=Object.keys(counts.byMin||{});
    for(var mn=0;mn<=upto;mn+=2){var hh=0,aa=0;
      for(var j=Math.max(0,mn-3);j<=mn+3;j++){var c=counts.byMin[j];if(c){hh+=c[0];aa+=c[1];}}
      out.push([mn, (hh+aa)>0?hh/(hh+aa):0.5]); }
    return out;
  }
  function possCounts(){ var b={};Object.keys(M.poss).forEach(function(m){b[m]=M.poss[m];});return {byMin:b}; }
  function dgrCounts(){ var b={};for(var s=1;s<=2;s++)Object.keys(M.dgr[s]).forEach(function(m){b[m]=b[m]||[0,0];b[m][s-1]+=M.dgr[s][m];});return {byMin:b}; }

  // ---------- render the whole cloth (0→dur); the clip reveals it up to the live edge ----------
  function renderCloth(){
    var DUR=M.dur, HH=H(), ch=HH-top-botpad;
    var belA=M.belief.map(function(b){return [b.m,b.h,b.d,b.a];});
    var NS=Math.max(8,Math.round(DUR/1.7)), sm=[];
    for(var i=0;i<=NS;i++){var mm=DUR*i/NS; sm.push([mm,interp(belA,mm,1),interp(belA,mm,2),interp(belA,mm,3)]);}
    (function(){var o=sm.map(function(r){return r.slice();}),w=2;
      for(var i=0;i<sm.length;i++)for(var k=1;k<=3;k++){var s=0,c=0;for(var j=Math.max(0,i-w);j<=Math.min(sm.length-1,i+w);j++){s+=sm[j][k];c++;}o[i][k]=s/c;} sm=o;})();

    var svg='<svg id="loomsvg" viewBox="0 0 '+W+' '+HH+'" xmlns="http://www.w3.org/2000/svg">';
    svg+='<defs><pattern id="weave" width="5" height="5" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="none"/><rect x="0" y="0" width="2.5" height="2.5" fill="#ffffff1a"/><rect x="2.5" y="2.5" width="2.5" height="2.5" fill="#ffffff1a"/><rect x="2.5" y="0" width="2.5" height="2.5" fill="#00000018"/><rect x="0" y="2.5" width="2.5" height="2.5" fill="#00000018"/></pattern><pattern id="weft" width="6" height="4" patternUnits="userSpaceOnUse"><rect y="0" width="6" height="1.5" fill="#ffffff18"/><rect y="2" width="6" height="1.6" fill="#00000012"/></pattern>';
    svg+='<clipPath id="reveal"><rect id="revrect" x="0" y="0" width="'+W+'" height="'+ty(M.t)+'"/></clipPath></defs>';
    svg+='<rect width="'+W+'" height="'+HH+'" fill="#EAE1C8"/>';
    // warp underlay — the threaded loom, always visible (the un-woven future below the edge)
    for(var wx=gx0+3;wx<gx0+grW;wx+=5){svg+='<rect x="'+wx+'" y="'+top+'" width="1.3" height="'+ch+'" fill="#00000010"/>';}

    // ---- the woven cloth (clipped to the live edge) ----
    svg+='<g clip-path="url(#reveal)">';
    function band(rf){var p='M '+gx0.toFixed(1)+' '+ty(0).toFixed(1);for(var i=0;i<=NS;i++)p+=' L '+gx(rf(sm[i])).toFixed(1)+' '+ty(sm[i][0]).toFixed(1);p+=' L '+gx0.toFixed(1)+' '+ty(DUR).toFixed(1)+' Z';return p;}
    svg+='<rect x="'+gx0+'" y="'+top+'" width="'+grW+'" height="'+ch+'" fill="'+AWAY+'" opacity="0.9"/>';
    svg+='<path d="'+band(function(s){return s[1]+s[2];})+'" fill="'+DRAW+'"/>';
    svg+='<path d="'+band(function(s){return s[1];})+'" fill="'+HOME+'" opacity="0.92"/>';
    svg+='<rect x="'+gx0+'" y="'+top+'" width="'+grW+'" height="'+ch+'" fill="url(#weave)"/>';
    svg+='<rect x="'+gx0+'" y="'+top+'" width="'+grW+'" height="'+ch+'" fill="url(#weft)"/>';   // weft thread-crowns over the interlace
    function edge(rf){var p='M '+gx(rf(sm[0])).toFixed(1)+' '+ty(sm[0][0]).toFixed(1);for(var i=1;i<=NS;i++)p+=' L '+gx(rf(sm[i])).toFixed(1)+' '+ty(sm[i][0]).toFixed(1);return p;}
    svg+='<path d="'+edge(function(s){return s[1];})+'" fill="none" stroke="#C79A38" stroke-width="1.4" opacity="0.7"/>';
    svg+='<path d="'+edge(function(s){return s[1]+s[2];})+'" fill="none" stroke="#C79A38" stroke-width="1.1" opacity="0.5"/>';
    // cords
    var pS=shareSeries(possSeed,possCounts(),DUR), dS=shareSeries(dgrSeed,dgrCounts(),DUR);
    function cordP(arr){var p='';for(var i=0;i<arr.length;i++){var x=gx(50+(0.5-arr[i][1])*42),y=ty(arr[i][0]);p+=(i?' L ':'M ')+x.toFixed(1)+' '+y.toFixed(1);}return p;}
    if(pS.length>1)svg+='<path d="'+cordP(pS)+'" fill="none" stroke="#2E2A21" stroke-width="2.7" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>';
    if(dS.length>1)svg+='<path d="'+cordP(dS)+'" fill="none" stroke="#D2731F" stroke-width="2.7" stroke-dasharray="0.6 3.4" stroke-linejoin="round" stroke-linecap="round" opacity="1"/>';
    // events (thirds · sub-minute x · de-conflict)
    var SW=grW*0.40, MIDW=grW*0.20, ZONE={h:[gx0,gx0+SW],a:[gx0+SW+MIDW,gx0+grW],'null':[gx0+SW,gx0+SW+MIDW]};
    function gs(t){return t==='goal'?2.2:(t==='freekick'?1.2:1.5);}
    var placed=[];
    M.events.slice().sort(function(p,q){return (p.m-q.m)||((p.t==='goal'?0:1)-(q.t==='goal'?0:1));}).forEach(function(ev){
      var side=ev.s||'null',s=gs(ev.t),r=N*s/2+2.4,Z=ZONE[side],zL=Z[0]+r+1,zR=Z[1]-r-1,zW=Math.max(1,zR-zL);
      var frac=ev.m-Math.floor(ev.m),x=zL+frac*zW,y=ty(ev.m);
      for(var it=0;it<200;it++){var hit=null;for(var k=0;k<placed.length;k++){var p=placed[k];if(p.side!==side)continue;if(Math.abs(x-p.x)<r+p.r+1.5&&Math.abs(y-p.y)<r+p.r+1.5){hit=p;break;}}
        if(!hit)break; if(Math.abs(y-hit.y)<r*0.7){var dir=(x>=hit.x)?1:-1,nx=hit.x+dir*(r+hit.r+1.5);if(nx>=zL&&nx<=zR){x=nx;continue;}} y=hit.y+(r+hit.r+1.5);}
      placed.push({x:x,y:y,r:r,side:side,t:ev.t});});
    placed.forEach(function(P){var team=(P.side==='h')?HOME:(P.side==='a')?AWAY:'#8C8467',big=(P.t==='goal');
      svg+='<rect x="'+(P.x-P.r).toFixed(1)+'" y="'+(P.y-P.r).toFixed(1)+'" width="'+(P.r*2).toFixed(1)+'" height="'+(P.r*2).toFixed(1)+'" rx="3" fill="#F3ECDB" opacity="0.92"/>';
      if(big)svg+='<rect x="'+(P.x-P.r).toFixed(1)+'" y="'+(P.y-P.r).toFixed(1)+'" width="'+(P.r*2).toFixed(1)+'" height="'+(P.r*2).toFixed(1)+'" rx="3" fill="none" stroke="#C79A38" stroke-width="1.5"/>';
      svg+=glyph(P.t,P.x,P.y,gs(P.t),team);});
    svg+='</g>';   // end clipped cloth

    // minute rails (always visible, past + future)
    for(var mn=0;mn<=DUR+1;mn+=15){var y=ty(mn);
      svg+='<line x1="'+(gx0-6)+'" y1="'+y+'" x2="'+gx0+'" y2="'+y+'" stroke="#1A1815" stroke-width="1.4"/>';
      svg+='<text x="'+(gx0-9)+'" y="'+(y+3)+'" text-anchor="end" font-family="Anybody" font-weight="700" font-size="8" fill="#8C8467">'+mn+"'</text>";}
    // the live shuttle / weaving edge — only on the LIVE, un-sealed cloth; the frozen keepsake has no shuttle
    if(!KEEP && !SEALED)
      svg+='<g id="shut"><line id="shutL" x1="'+gx0+'" y1="'+ty(M.t)+'" x2="'+(gx0+grW)+'" y2="'+ty(M.t)+'" stroke="#1A1815" stroke-width="2" opacity=".9"/><rect id="shutB" x="'+(gx0-4)+'" y="'+(ty(M.t)-4)+'" width="8" height="8" fill="#C79A38" stroke="#1A1815" stroke-width="1.4"/></g>';
    // ---- THE PRESSING: at full time the cloth gilds its own selvage and prints its seal beneath ----
    if(SEALED){
      var FTY=ty(M.dur);
      svg+='<rect class="ksFrame" x="'+(gx0-4)+'" y="'+(top-4)+'" width="'+(grW+8)+'" height="'+((FTY-top)+8).toFixed(1)+'" fill="none" stroke="#C79A38" stroke-width="2.6"/>';
      var sy=FTY+22;
      svg+='<g class="ksSeal">';
      svg+='<text x="'+(W/2)+'" y="'+sy.toFixed(1)+'" text-anchor="middle" font-family="Anybody" font-weight="900" font-size="13" letter-spacing="1.4" fill="#C79A38">FULL TIME</text>';
      svg+='<text x="'+(W/2)+'" y="'+(sy+16).toFixed(1)+'" text-anchor="middle" font-family="Anybody" font-weight="800" font-size="10.5" letter-spacing="0.4" fill="#1A1815">THE SCARF IS YOURS · '+M.hTri+' '+M.score[0]+'–'+M.score[1]+' '+M.aTri+'</text>';
      var hy=sy+40;
      // the fan's own proven call, woven into the seal (from the relic's tx-signed receipts) — honest-empty until bound
      if(KS.call && KS.call.label){
        svg+='<text x="'+(W/2)+'" y="'+(sy+31).toFixed(1)+'" text-anchor="middle" font-family="Anybody" font-weight="800" font-size="7.5" letter-spacing="0.5" fill="#C79A38">YOUR CALL · '+esc(KS.call.label)+(KS.call.hit!=null?(KS.call.hit?' ✓':' —'):'')+'</text>';
        hy=sy+52;
      }
      svg+='<line x1="'+gx0+'" y1="'+(hy-10).toFixed(1)+'" x2="'+(gx0+grW)+'" y2="'+(hy-10).toFixed(1)+'" stroke="#C3B590" stroke-width="1"/>';
      svg+='<text x="'+gx0+'" y="'+hy.toFixed(1)+'" font-family="Anybody" font-weight="700" font-size="6.6" letter-spacing="0.6" fill="#8C8467">'+(KS.owner?('WOVEN FOR '+esc(KS.owner)):'WOVEN LIVE FROM THE WIRE')+'</text>';
      svg+='<text x="'+(gx0+grW).toFixed(1)+'" y="'+hy.toFixed(1)+'" text-anchor="end" font-family="Anybody" font-weight="700" font-size="6.6" letter-spacing="0.6" fill="#8C8467">Nº '+(KS.editionNo!=null?esc(String(KS.editionNo)):'—')+'</text>';
      for(var hi=0;hi<3;hi++)svg+='<rect x="'+(gx0+grW-38+hi*13)+'" y="'+(hy+7)+'" width="10" height="10" fill="none" stroke="#C3B590" stroke-width="0.9"/>';
      svg+='</g>';
    }
    svg+='</svg>';
    loomEl.querySelector('svg')&&loomEl.querySelector('svg').remove();
    loomEl.insertAdjacentHTML('afterbegin',svg);
  }

  // ---------- per-frame: advance the edge, reveal, auto-scroll, fire GOOOL ----------
  var goolQ=[], goolFired={}, goolT=0;
  function queueGool(minute,side){ goolQ.push({m:minute,side:side}); }
  function fireGool(){ var g=document.getElementById('gooool'); g.classList.remove('on'); void g.offsetWidth; g.classList.add('on'); }
  var REPLAY_SPEED=1.5;   // replay minutes per real second (whole match ~in 80s)
  var lastMs=(window.performance&&performance.now())||Date.now(), userScrolled=0;
  loomEl.addEventListener('scroll',function(){ userScrolled=Date.now(); },{passive:true});
  function step(now){
    var dt=Math.min(0.3,(now-lastMs)/1000); lastMs=now;   // clamp only the rare huge gap (tab resurfacing); the live clock is anchor-based so this only paces the replay
    if(KEEP){ M.t=M.dur; }                                 // keepsake: frozen at full time
    else if(M.live){ if(M.run){ M.t=Math.min(M.dur, M.anchorMin + ((now - M.anchorMs)/60000)); } }
    else { M.t=Math.min(M.dur, M.t + dt*REPLAY_SPEED); }   // replay weaves forward
    // replay: the score climbs as each goal weaves past the shuttle (live gets it from __loom.score)
    if(!M.live){ var hh=0,aa=0; for(var gi=0;gi<goolQ.length;gi++){ if(M.t>=goolQ[gi].m){ if(goolQ[gi].side===1)hh++;else aa++; } } M.score=[hh,aa]; }
    var ended=(!M.live && M.t>=M.dur-0.3);
    if(ended && !SEALED){ SEALED=true; dirty=true;                       // THE PRESSING fires once, at full time
      setTimeout(function(){ try{ loomEl.scrollTop=loomEl.scrollHeight; }catch(e){} }, 520); }   // the cloth settles to reveal its seal
    // reveal + shuttle (cheap per-frame updates, no full re-render)
    var rr=document.getElementById('revrect'); if(rr)rr.setAttribute('height', ty(M.t).toFixed(1));
    var sl=document.getElementById('shutL'), sb=document.getElementById('shutB');
    if(sl){sl.setAttribute('y1',ty(M.t).toFixed(1));sl.setAttribute('y2',ty(M.t).toFixed(1));}
    if(sb)sb.setAttribute('y',(ty(M.t)-4).toFixed(1));
    // auto-scroll to keep the weaving edge in the lower third (unless the fan just scrolled)
    if(!KEEP && !SEALED && Date.now()-userScrolled>2600){ var svgH=loomEl.scrollHeight, viewH=loomEl.clientHeight, edgePx=(ty(M.t)/H())*svgH; loomEl.scrollTop=Math.max(0,edgePx-viewH*0.72); }
    // GOOOL when the edge reaches a goal
    goolQ.forEach(function(g,i){ if(!goolFired[i] && M.t>=g.m){ goolFired[i]=true; fireGool(); } });
    // masthead
    document.getElementById('sc').textContent=M.score[0]+'–'+M.score[1];
    var _hT=document.getElementById('hT'),_aT=document.getElementById('aT');
    _hT.textContent=M.hTri; _aT.textContent=M.aTri; _hT.style.color=mastInk(HOME); _aT.style.color=mastInk(AWAY);
    var mm=Math.floor(M.t), lbl=ended?('FULL TIME · '+mm+'′'):((M.live?'LIVE':'REPLAY')+' · '+mm+'′');
    document.getElementById('rp').textContent=lbl;
    document.getElementById('liveDot').style.background=(M.live&&!ended)?'#C8202A':'#8C8467';
    if(dirty){ dirty=false; renderCloth(); }
  }
  function loop(now){ step(now); requestAnimationFrame(loop); }   // smooth while watched

  // boot: seed the replay (goes live the moment loom-adapter calls __loom.live())
  seedReplay();
  // theme AFTER seedReplay (which sets the ARG-CPV demo) — from ?match= (loom-adapter drives
  // the DATA off the same param; this wire has no fixtureInfo, so theme locally like loom-proto).
  (function(){ var FX={ '18202701':['ARG','ARGENTINA','#75AADB','EGY','EGYPT','#CE1126'],
    '18202783':['SUI','SWITZERLAND','#D52B1E','COL','COLOMBIA','#FCD116'],
    '18193785':['USA','USA','#2A3B78','BEL','BELGIUM','#B4232B'], '18209181':['FRA','FRANCE','#0055A4','MAR','MOROCCO','#C1272D'] };
    // only re-theme when a match is EXPLICITLY requested (live/coordinator); otherwise keep the
    // replay data's own teams so the standalone loom stays coherent (data ↔ teams matched).
    var mid=new URLSearchParams(location.search).get('match'), f=mid&&FX[mid];
    if(f) window.__loom.teams({tri:f[0],name:f[1],primary:f[2]},{tri:f[3],name:f[4],primary:f[5]});
  })();
  if(KEEP)M.t=M.dur;   // freeze the finished cloth
  // pre-queue the replay's goals so the demo erupts (live goals queue via __loom.event)
  if(!M.live)M.events.forEach(function(e){ if(e.t==='goal')queueGool(e.m,e.s==='h'?1:2); });
  renderCloth();
  requestAnimationFrame(loop);
  setInterval(function(){ if(document.hidden) step((window.performance&&performance.now())||Date.now()); }, 250);   // keep weaving when backgrounded (rAF pauses)

  // legend
  var LG=[['goal','GOAL'],['save','SAVE'],['block','BLOCK'],['miss','MISS'],['corner','CORNER'],['freekick','FREE KICK'],['offside','OFFSIDE'],['yc','CARD'],['var','VAR'],['sub','SUB']];
  var marks=LG.map(function(l){return '<span class="it"><svg viewBox="0 0 '+(N*3)+' '+(N*3)+'">'+glyph(l[0],N*1.5,N*1.5,3,'#2049AA')+'</svg>'+l[1]+'</span>';}).join('');
  marks+='<span class="it"><svg viewBox="0 0 24 11"><line x1="2" y1="5.5" x2="22" y2="5.5" stroke="#2E2A21" stroke-width="3" stroke-linecap="round"/></svg>POSSESSION</span>';
  marks+='<span class="it"><svg viewBox="0 0 24 11"><line x1="2" y1="5.5" x2="22" y2="5.5" stroke="#D2731F" stroke-width="3" stroke-dasharray="0.6 3.6" stroke-linecap="round"/></svg>DANGER</span>';
  document.getElementById('legend').innerHTML=marks;
})();
</script>
<script src="plate/demo-suicol.js"></script>
<script src="demo-feed.js"></script>
<script src="loom-adapter.js"></script>
</body>
