<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>THE GROUND — your place at the match</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#E6DBC2">
<style>
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody.woff2) format('woff2');font-weight:400 700;font-display:swap}
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody900.woff2) format('woff2');font-weight:800 900;font-display:swap}
:root{
  --paper:#E6DBC2; --card:#F3ECDB; --ink:#1A1815; --sub:#8C8467; --line:#D3C6A6;
  --gold:#C79A38; --verde:#2E6A4E; --you:#2049AA; --them:#C8504D;
  --disp:'Anybody','Arial Black',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--ink);-webkit-font-smoothing:antialiased;font-family:var(--disp);color:var(--ink);overflow:hidden}
.wrap{position:relative;width:100%;max-width:440px;height:100vh;margin:0 auto;background:var(--paper);display:flex;flex-direction:column}

/* masthead — the score, and the way to your cabinet */
.cmast{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--paper);border-bottom:1.5px solid var(--ink);z-index:4}
.cmast .sc{font-weight:900;font-size:15px;letter-spacing:.02em;white-space:nowrap}
.cmast .sc .h{color:var(--you)}.cmast .sc .a{color:var(--them)}
.cmast .min{font-weight:700;font-size:8px;letter-spacing:.1em;color:var(--sub);margin-left:5px}
.cabbtn{height:26px;flex:none;padding:0 9px;border:1.5px solid var(--ink);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;letter-spacing:.14em;color:var(--ink);text-decoration:none;-webkit-tap-highlight-color:transparent}
.cabbtn:active{background:var(--ink);color:var(--card)}

/* THE DIAL — one control. THE STANDS at home; lean into LOOM (left) or STADIUM (right). */
.dial{display:flex;border-bottom:1.5px solid var(--ink);background:var(--card)}
.dseg{flex:1;display:flex;flex-direction:column;justify-content:center;padding:7px 4px 6px;text-align:center;background:var(--card);color:var(--sub);cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;position:relative;transition:background .2s,color .2s}
.dseg+.dseg{border-left:1.5px solid var(--ink)}
.dseg .dt{display:block;font-family:var(--disp);font-weight:900;font-size:10px;letter-spacing:.09em;line-height:1}
.dseg .dhint{display:block;font-weight:700;font-size:7.5px;letter-spacing:.13em;margin-top:3px;opacity:.7}
.dseg.on{background:var(--ink);color:var(--card)}
.dseg.on .dhint{opacity:.6}
.dseg.home::after{content:"⌂";position:absolute;top:3px;right:5px;font-size:7px;opacity:.45}

/* the crowd frames the lens — FULL (the terrace) at home, thin FRAMING at loom/stadium, morphing between */
.them,.you{overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1),opacity .3s ease}
.wrap.crowd-full .them,.wrap.crowd-full .you{max-height:0!important;opacity:0;pointer-events:none}

/* their end — the far stand, thin across the top */
.them{--roar:0;position:relative;display:flex;align-items:center;gap:9px;padding:6px 13px;max-height:50px;background:linear-gradient(180deg,rgba(200,80,77,.17),transparent);border-bottom:1.5px solid var(--ink)}
.them::after{content:"";position:absolute;inset:0;background:var(--them);opacity:calc(var(--roar,0)*.34);pointer-events:none;transition:opacity .14s}
.them>*{position:relative;z-index:1}
.them.roar{animation:theirRoar .45s ease-out}
@keyframes theirRoar{0%{filter:brightness(1)}35%{filter:brightness(1.22)}100%{filter:brightness(1)}}
.them .nm{font-weight:800;font-size:8px;letter-spacing:.12em;color:var(--them);white-space:nowrap}
.them .mini{display:flex;gap:2px;flex:1;overflow:hidden}
.them .mini i{width:7px;height:7px;background:var(--them);opacity:.42;flex:none;transition:opacity .12s,box-shadow .12s}
.them .mini i:nth-child(3n){background:var(--themsec,var(--them))}   /* the kit's second colour in the far stand — identity, never data */
.them .mini i:nth-child(6n){background:var(--themsec2,var(--themsec,var(--them)))}   /* and the third (BEL red) */
.them .mini i.hot{opacity:1;box-shadow:0 0 5px var(--themsec,var(--them))}
.them .ct{font-weight:700;font-size:7.5px;letter-spacing:.06em;color:var(--sub);white-space:nowrap}

/* the centre — the lens you dial to */
.center{position:relative;flex:1;min-height:0;background:var(--card);overflow:hidden}
.center iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;background:var(--paper);
  transition:transform .3s cubic-bezier(.3,0,.2,1)}   /* three living panes sliding — no reloads, no lost state (owner, 17 Jul) */

/* your end — the foreground you cheer from */
.you{position:relative;max-height:118px;background:linear-gradient(0deg,rgba(32,73,170,.19),transparent);padding:9px 13px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;border-top:1.5px solid var(--ink)}
.you .yhd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
.you .nm{font-weight:800;font-size:8.5px;letter-spacing:.12em;color:var(--you)}
.you .reads{font-weight:800;font-size:8px;letter-spacing:.07em;color:var(--sub)}
.you .reads b{color:var(--gold)}
.cheerbar{display:flex;align-items:center;gap:8px}
.cheerbar .cl{font-weight:800;font-size:7.5px;letter-spacing:.13em;color:var(--sub);min-width:66px}
.cheerbar .bar{flex:1;height:9px;background:var(--card);border:1.5px solid var(--ink);overflow:hidden}
.cheerbar .fill{height:100%;width:0;background:var(--you);transition:width .1s}
.cheerbar .bar.tick{animation:cbTick .26s ease}   /* one accepted cheer from your end — a single tick, never volume */
@keyframes cbTick{40%{box-shadow:0 0 0 2.5px var(--yousec,var(--you))}}
.cheerbar .cv{font-weight:800;font-size:8px;color:var(--sub);min-width:44px;text-align:right}
.taphint{text-align:center;font-weight:800;font-size:7.5px;letter-spacing:.15em;color:var(--sub);margin-top:7px}
.cburst{position:absolute;left:50%;top:5px;transform:translateX(-50%) scale(.6);font-weight:900;font-size:24px;color:var(--you);opacity:0;pointer-events:none}
.cburst.pop{animation:cb .9s cubic-bezier(.2,1.5,.35,1) forwards}
@keyframes cb{0%{opacity:0;transform:translateX(-50%) scale(.5)}30%{opacity:.9;transform:translateX(-50%) scale(1.1)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
.spec{flex:none;text-align:center;padding:4px 8px;font-weight:800;font-size:7px;letter-spacing:.12em;color:var(--sub);background:var(--paper);border-top:1.5px solid var(--ink)}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important}}
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>

  <div class="cmast">
    <span class="sc"><span class="h" id="hT">ARG</span> <span id="sc">v</span> <span class="a" id="aT">CPV</span><span class="min" id="clk"></span></span>

</div>

<script>
var PARAMS=new URLSearchParams(location.search);
var DEMO=PARAMS.get('demo')==='1', LIVE=!DEMO, WS=PARAMS.get('ws');   // live is the default; specimen only under ?demo=1
var explicitMatch=PARAMS.get('match');
var FIXTURES={
  '18202783':{home:{tri:'SUI',name:'SUI',color:'#D52B1E'},away:{tri:'COL',name:'COL',color:'#E8B10A'}},
  '18209181':{home:{tri:'FRA',name:'FRA',color:'#0055A4'},away:{tri:'MAR',name:'MAR',color:'#C1272D'}},
  '18218149':{home:{tri:'ESP',name:'ESP',color:'#AA151B',sec:'#F1BF00'},away:{tri:'BEL',name:'BEL',color:'#1A1A18',sec:'#FDDA24',sec2:'#C8102E'}},
  '18213979':{home:{tri:'NOR',name:'NOR',color:'#BA0C2F'},away:{tri:'ENG',name:'ENG',color:'#1A1A18'}},
  '18222446':{home:{tri:'ARG',name:'ARG',color:'#5C8CB8'},away:{tri:'SUI',name:'SUI',color:'#D52B1E'}},
  '18237038':{home:{tri:'FRA',name:'FRA',color:'#0055A4'},away:{tri:'ESP',name:'ESP',color:'#AA151B',sec:'#F1BF00'}},
  '18241006':{home:{tri:'ENG',name:'ENG',color:'#1A1A18'},away:{tri:'ARG',name:'ARG',color:'#5C8CB8'}},
};
// T16 — the __fixture manifest is the one truth; FIXTURES above is now only the
// explicit-?match lookup + the last-resort fallback (never invent a fixture). The
// manifest carries no tertiary colour (BEL's sec2 flourish stays a literal-only
// touch) — sec falls back gracefully wherever sec2 is read.
// masthead ink — the team's colour, darkened only if too light to read on the cream
// paper (mirrors woven-loom.html's mastInk pattern, e.g. tonight's ENG white); sec is
// only ever a background/accent fill, never raw type, so it's untouched.
function mastInk(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var lum=(0.299*r+0.587*g+0.114*b)/255;
  if(lum<=0.55)return hex;
  var k=0.55/lum;
  function h2(n){ var s=Math.round(n*k).toString(16); return s.length<2?'0'+s:s; }
  return '#'+h2(r)+h2(g)+h2(b);
}
function fromManifest(mf){
  return {
    home:{tri:mf.home.code,name:mf.home.code,color:mastInk(mf.home.colors[0]),sec:mf.home.colors[1]},
    away:{tri:mf.away.code,name:mf.away.code,color:mastInk(mf.away.colors[0]),sec:mf.away.colors[1]}
  };
}
// adopt-#1 (docs/DATA-ARCHITECTURE.md §4): fixture.home/away (contracts/feed.ts) share the
// manifest's {code,name,colors} shape — same mapping, different (any-known-fixture) source.
var fromFixtureInfo=fromManifest;
// the schedule (window.__matchday) — the one clock. Adds phase + the sealed final +
// replay (baked programme exists), so the hub's chrome and lens routing follow the truth.
function fromSchedule(fx){
  function ink(cs){ var c=cs[0]; var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    if((0.299*r+0.587*g+0.114*b)/255>0.85&&cs[1])c=cs[1]; return mastInk(c); }
  return {
    home:{tri:fx.home.code,name:fx.home.code,color:ink(fx.home.colors),sec:fx.home.colors[1]},
    away:{tri:fx.away.code,name:fx.away.code,color:ink(fx.away.colors),sec:fx.away.colors[1]},
    phase:fx.phase,finalScore:fx.finalScore||null,replay:!!fx.replay,stage:fx.stage||null
  };
}
var PASS=null; try{ PASS=JSON.parse(localStorage.getItem('rooot.pass')||'null'); }catch(e){}
var byq=function(s){return document.querySelector(s);}, el=function(i){return document.getElementById(i);};
var wrap=el('wrap'), dial=el('dial');
var panes={loom:el('pane-loom'),stands:el('pane-stands'),stadium:el('pane-stadium')};

function boot(MATCH_ID,FX){
var SEALED=FX.phase==='FULL_TIME'&&FX.replay;   // the sealed programme — baked data, not a dead wire
function lensSrc(name){
  var base={loom:'woven-loom.html',stands:'terrace.html',stadium:'stadium.html'}[name];
  var q='?embed=1';
  if(DEMO)q+='&match=18202783&demo=1';
  // sealed programme: loom + stadium ride the baked replay (real replay branches).
  // The stands keep the live socket — real room counts + the durable sentiment record;
  // terrace has no honest replay branch yet (its no-wire default is the sample world).
  else if(SEALED&&name!=='stands')q+='&replay=1&match='+encodeURIComponent(MATCH_ID);
  else if(LIVE)q+='&live=1&match='+encodeURIComponent(MATCH_ID)+'&site=1&standsfeed=1&loomfeed=1&statsfeed=1';
  else if(name==='stadium')q+='&match=argcpv';
  if(WS)q+='&ws='+encodeURIComponent(WS);   // thread the dry-run WS override into the lens so it hits the same wire
  return base+q;
}
var order=['loom','stands','stadium'], cur=1;   // THE STANDS is home
window.__groundLens=function(name){ setLens(name); };   // the lenses may flip the dial (the stadium's stands-dot)
function slide(){ order.forEach(function(n,i){ panes[n].style.transform='translateX('+((i-cur)*100)+'%)'; }); }
function setLens(name){
  if(order.indexOf(name)<0)return;
  cur=order.indexOf(name);
  slide();   // the panes never reload — every lens keeps its scroll, its cards, its state
  wrap.classList.toggle('crowd-full', name==='stands');   // stands = crowd full; loom/stadium = crowd frames the lens
  [].forEach.call(dial.children,function(t){ t.classList.toggle('on', t.dataset.lens===name); });
}
[].forEach.call(dial.children,function(t){ t.onclick=function(){ setLens(t.dataset.lens); }; });
// lean the dial by swiping — from ANY lens (owner, 17 Jul: "as easy as swipe one
// direction"). Each pane is same-origin, so the swipe binds INSIDE every pane's
// document as it loads (pointer + touch both, for every mobile engine); a
// dominant-axis guard keeps vertical scrolling from stealing a swipe.
var cx=0;
function swipeTo(dx,dy){ if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy||0)*1.5){ var ni=Math.max(0,Math.min(order.length-1,cur+(dx<0?1:-1))); setLens(order[ni]); } }
wrap.addEventListener('touchstart',function(e){cx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener('touchend',function(e){ swipeTo(e.changedTouches[0].clientX-cx,0); },{passive:true});
function bindSwipe(frame){
  frame.addEventListener('load',function(){
    try{
      var d=frame.contentDocument; if(!d)return;
      var sx=0,sy=0,pd=false;
      d.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
      d.addEventListener('touchend',function(e){ swipeTo(e.changedTouches[0].clientX-sx,e.changedTouches[0].clientY-sy); },{passive:true});
      d.addEventListener('pointerdown',function(e){ if(e.pointerType==='touch')return; pd=true; sx=e.clientX; sy=e.clientY; },{passive:true});
      d.addEventListener('pointerup',function(e){ if(!pd)return; pd=false; swipeTo(e.clientX-sx,e.clientY-sy); },{passive:true});
    }catch(e){}
  });
}
order.forEach(function(n){ bindSwipe(panes[n]); });
// their mini mosaic
var mt=el('miniThem'); for(var i=0;i<16;i++)mt.insertAdjacentHTML('beforeend','<i></i>');
// your cheer (tap → fills + decays; a ROOOT! burst at the peak)
var cheer=0, themRoar=0, lastMs=performance.now(), lastBurst=0, lastLiveThem=0;
el('youEnd').addEventListener('pointerdown',function(){ cheer=Math.min(1,cheer+0.19); if((DEMO||LIVE)&&window.__stands)window.__stands.cheer(); });
function cw(r){return r>.8?'DEAFENING':r>.55?'LOUD':r>.3?'rising':r>.12?'murmur':'quiet';}
function liveRoarLevel(v){return v>0?Math.min(1,0.28+v*1.6):0;}
function flashThem(){
  var band=el('themBand'); band.classList.remove('roar'); void band.offsetWidth; band.classList.add('roar');
  setTimeout(function(){band.classList.remove('roar');},520);
  for(var i=0;i<mt.children.length;i++){ if(((i*7+Date.now())%3)===0){ var m=mt.children[i]; m.classList.add('hot'); (function(m){setTimeout(function(){m.classList.remove('hot');},260);})(m); } }
}
// the discrete echo — ONE person, one flicker (flashThem is the roar's; this is a single cell / a single tick)
function flashOne(){ var m=mt.children[Math.floor(performance.now()/97)%mt.children.length]; if(!m)return; m.classList.add('hot'); setTimeout(function(){m.classList.remove('hot');},260); }
function tickYou(){ var b=byq('.cheerbar .bar'); if(!b)return; b.classList.remove('tick'); void b.offsetWidth; b.classList.add('tick'); }
function loop(now){ var dt=Math.min(.3,(now-lastMs)/1000); lastMs=now; cheer=Math.max(0,cheer-dt*0.3);
  themRoar=Math.max(0,themRoar-dt*0.55); el('themBand').style.setProperty('--roar',themRoar.toFixed(3));
  el('cheerFill').style.width=(cheer*100)+'%'; el('cheerV').textContent=cw(cheer);
  if(cheer>0.55 && (now-lastBurst)>1600){ lastBurst=now; var b=el('cburst'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); }
  requestAnimationFrame(loop); }
requestAnimationFrame(loop);
// ?demo=1 — the hub reads one truth: __match (score/clock) + __stands (crowd); nav carries demo
if(DEMO){
  byq('.cabbtn').setAttribute('href','cabinet.html?demo=1');
  document.documentElement.style.setProperty('--you','#D52B1E'); document.documentElement.style.setProperty('--them','#E8B10A');
  el('hT').textContent='SUI'; el('aT').textContent='COL';
  el('themNm').textContent='COL · THEIR END'; el('youNm').textContent='SUI · YOUR END';
  el('spec').textContent='THE CROWD IS SIMULATED · THE MATCH IS A BAKED SUI–COL REPLAY';
  if(window.__match)window.__match.on(function(m){ el('sc').textContent=m.score.home+'–'+m.score.away;
    if(m.clock)el('clk').textContent='· '+(m.clock.phase==='HALF_TIME'?'HT':(m.clock.min+"'")); });
  if(window.__stands){ window.__stands.root('home'); window.__stands.onState(function(s){ if(s.rooted){
    el('themCt').textContent=(s.rooted.away||0).toLocaleString(); el('youReads').innerHTML=(s.rooted.home||0).toLocaleString()+' HERE'; } }); }
}
function wireLive(){
  if(!LIVE)return true;
  var sideKey=PASS&&PASS.side==='a'?'away':'home', other=sideKey==='home'?'away':'home';
  var you=sideKey==='home'?FX.home:FX.away, them=other==='home'?FX.home:FX.away;
  byq('.cabbtn').setAttribute('href','cabinet.html?live=1&match='+encodeURIComponent(MATCH_ID)+(WS?'&ws='+encodeURIComponent(WS):''));
  document.documentElement.style.setProperty('--you',you.color); document.documentElement.style.setProperty('--them',them.color);
  document.documentElement.style.setProperty('--yousec',you.sec||you.color); document.documentElement.style.setProperty('--themsec',them.sec||them.color);
  document.documentElement.style.setProperty('--yousec2',you.sec2||you.sec||you.color); document.documentElement.style.setProperty('--themsec2',them.sec2||them.sec||them.color);
  el('hT').textContent=FX.home.tri; el('aT').textContent=FX.away.tri; el('hT').style.color=FX.home.color; el('aT').style.color=FX.away.color;
  el('themNm').textContent=them.tri+' · THEIR END'; el('youNm').textContent=you.tri+' · YOUR END';
  el('spec').textContent=SEALED?'THE SEALED MATCH · REWATCH IT ANY TIME':'LIVE CROWD + MATCH WIRE · YOUR SEAT';
  if(SEALED&&FX.finalScore){ el('sc').textContent=FX.finalScore.home+'–'+FX.finalScore.away; el('clk').textContent='· FULL TIME'; }
  if(window.__stands&&!wireLive.didStands){
    wireLive.didStands=true;
    if(PASS&&PASS.side!=='n')window.__stands.root(sideKey);
    if(PASS&&PASS.call)window.__stands.predict(PASS.call.h,PASS.call.a,PASS.conv||undefined);
    window.__stands.onState(function(s){ if(!s)return;
      if(s.roar){
        var yRaw=s.roar[sideKey]||0, tRaw=s.roar[other]||0, y=liveRoarLevel(yRaw), t=liveRoarLevel(tRaw);
        cheer=Math.max(cheer,y);
        themRoar=Math.max(themRoar,t);
        if(tRaw>lastLiveThem+0.02)flashThem();
        lastLiveThem=tRaw;
      }
      if(s.rooted){
        el('themCt').textContent=(s.rooted[other]||0).toLocaleString();
        el('youReads').innerHTML=(s.rooted[sideKey]||0).toLocaleString()+' HERE';
      }
    });
    if(window.__stands.onCheer)window.__stands.onCheer(function(e){
      if(e.side===other)flashOne(); else tickYou();   // one accepted cheer = one flicker; roar carries volume
    });
  }
  if(window.__statsAdapter&&!wireLive.didStats){
    wireLive.didStats=true;
    window.__statsAdapter.onStats(function(st){
      if(!st||SEALED)return;   // sealed chrome is finalScore-authoritative — a stale wire snapshot never overwrites FULL TIME
      el('sc').textContent=(st.home.goals||0)+'–'+(st.away.goals||0);
      if(typeof st.minute==='number')el('clk').textContent='· '+st.minute+"'";
    });
  }
  return wireLive.didStands&&wireLive.didStats;
}
if(LIVE&&!wireLive()){ var _liveGround=setInterval(function(){ if(wireLive())clearInterval(_liveGround); },160); }
order.forEach(function(n){ panes[n].src=lensSrc(n); });   // all three panes live from the start — swaps are slides, never reloads
setLens('stands');   // open at home — you take your place in THE STANDS
} // end boot

// T16/adopt-#1 fixture resolution: explicit ?match= wins outright (unchanged — literal-table
// lookup, no async wait) → else, on a live route, the __fixture manifest IF it matches this
// match (raced against a ~1500ms timeout, same idiom as stands-adapter.js) → else fixtureInfo
// (server truth, sentiment/teams.ts — ANY known fixture, the CPV-case fix) → else an honest
// neutral placeholder (never a stale OTHER match's literal). A live explicit ?match= that
// isn't one of the literal entries (e.g. gate forwarding its own manifest-resolved id) still
// checks the manifest before giving up, so the gate→ground→lens chain never shows a
// mismatched fixture once any surface has resolved the real one.
if(!LIVE){
  var mid=explicitMatch||'18202783';
  boot(mid,FIXTURES[mid]||FIXTURES['18218149']);
}else{
  var done=false, fallbackId=explicitMatch||'18218149';
  var NEUTRAL_FX={home:{tri:'—',name:'—',color:'#8C8467',sec:null},away:{tri:'—',name:'—',color:'#8C8467',sec:null}};
  function finish(id,fx){ if(done)return; done=true; boot(id,fx); }
  // the schedule first — it knows every matchday fixture with a real phase (same
  // pattern as gate.html); the literal table serves only ids the schedule never met.
  // A param-less ground NORMALIZES to ?match=<id> and reloads: the page's own
  // adapters resolve the match from the URL, so the id must live there or the
  // chrome and the wire can disagree (the FRA-1-2-ENG chimera, 17 Jul). Policy:
  // the live match if any, else the one whose gates are open, else the last
  // sealed programme (shut gates = the ground shows the sealed match; the gate
  // holds the upcoming one).
  if(window.__matchday){
    window.__matchday.ready.then(function(md){
      if(!explicitMatch){
        var live=null,gates=null;
        md.fixtures.forEach(function(f){ if(f.phase==='LIVE'&&!live)live=f; if(f.phase==='GATES_OPEN'&&!gates)gates=f; });
        var target=live||gates||md.lastSealed||md.current;
        if(target){ var qs=new URLSearchParams(location.search); qs.set('match',target.matchId);
          location.replace('ground.html?'+qs.toString()); return; }
      }
      var fx=explicitMatch?md.get(explicitMatch):null;
      if(fx)finish(fx.matchId,fromSchedule(fx));
      else if(explicitMatch&&FIXTURES[explicitMatch])finish(explicitMatch,FIXTURES[explicitMatch]);
    });
  }else if(explicitMatch&&FIXTURES[explicitMatch]){
    finish(explicitMatch,FIXTURES[explicitMatch]);
  }
  (function waitForFixtureInfo(){
    if(window.__stands&&window.__stands.onFixtureInfo){
      window.__stands.onFixtureInfo(function(fx){
        if(!fx||!fx.home||!fx.away)return;
        if(fx.id&&fx.id!==fallbackId)return;
        finish(fallbackId,fromFixtureInfo(fx));
      });
      return;
    }
    setTimeout(waitForFixtureInfo,120);
  })();
  window.__fixtureReady=window.__fixtureReady||fetch('/fixture.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  window.__fixtureReady.then(function(mf){
    if(window.__matchday)return;   // the schedule path above owns resolution when matchday.js is on the page
    if(mf&&mf.matchId&&mf.home&&mf.away&&(!explicitMatch||explicitMatch===mf.matchId)){ finish(mf.matchId,fromManifest(mf)); }
    // else: a manifest for a DIFFERENT match tells us nothing about this one — wait for fixtureInfo/timeout instead.
  },function(){ /* fetch failed — same: wait for fixtureInfo or the timeout */ });
  setTimeout(function(){ finish(fallbackId,NEUTRAL_FX); },1500);
}
</script>
