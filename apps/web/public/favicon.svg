<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- ROOOT mark: the scarf. Cream cloth in an ink frame, the four matchday
       bands down it, fringe top and bottom — the thing a fan keeps. Replaces
       the retired tide. Reads as a woven object at 16px. -->
  <rect width="32" height="32" rx="6" fill="#1A1815"/>
  <rect x="3.5" y="3.5" width="25" height="25" rx="2.5" fill="#EDE4CC"/>
  <rect x="6"    y="7.4" width="6.4" height="17.2" fill="#2E6A4E"/>
  <rect x="12.9" y="7.4" width="6.4" height="17.2" fill="#D52B1E"/>
  <rect x="19.8" y="7.4" width="6.2" height="17.2" fill="#E8B10A"/>
  <g fill="#1A1815">
    <rect x="6" y="6.1" width="20" height="1.3"/>
    <rect x="6" y="24.6" width="20" height="1.3"/>
  </g>
  <g fill="#1A1815" opacity=".9">
    <rect x="6.7"  y="4.7" width="1.1" height="1.5"/>
    <rect x="9.5"  y="4.7" width="1.1" height="1.5"/>
    <rect x="12.3" y="4.7" width="1.1" height="1.5"/>
    <rect x="15.1" y="4.7" width="1.1" height="1.5"/>
    <rect x="17.9" y="4.7" width="1.1" height="1.5"/>
    <rect x="20.7" y="4.7" width="1.1" height="1.5"/>
    <rect x="23.5" y="4.7" width="1.1" height="1.5"/>
    <rect x="6.7"  y="25.8" width="1.1" height="1.5"/>
    <rect x="9.5"  y="25.8" width="1.1" height="1.5"/>
    <rect x="12.3" y="25.8" width="1.1" height="1.5"/>
    <rect x="15.1" y="25.8" width="1.1" height="1.5"/>
    <rect x="17.9" y="25.8" width="1.1" height="1.5"/>
    <rect x="20.7" y="25.8" width="1.1" height="1.5"/>
    <rect x="23.5" y="25.8" width="1.1" height="1.5"/>
  </g>
</svg>
