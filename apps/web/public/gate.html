<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>THE TURNSTILE — take your place</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#E6DBC2">
<style>
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody.woff2) format('woff2');font-weight:400 700;font-display:swap}
@font-face{font-family:'Anybody';src:url(plate/fonts/anybody900.woff2) format('woff2');font-weight:800 900;font-display:swap}
:root{
  --paper:#E6DBC2; --card:#F3ECDB; --ink:#1A1815; --sub:#8C8467; --line:#D3C6A6;
  --gold:#C79A38; --verde:#2E6A4E; --oat:#D0C29E;
  --home:#D52B1E;              /* SUI — wires from fixture */
  --away:#E8B10A;              /* COL — wires from fixture */
  --pick:#8C8467;             /* becomes your side's colour once chosen */
  --disp:'Anybody','Arial Black',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--ink);-webkit-font-smoothing:antialiased;font-family:var(--disp);color:var(--ink)}
.wrap{position:relative;width:100%;max-width:440px;min-height:100vh;margin:0 auto;background:var(--paper);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.05'/></svg>");
  display:flex;flex-direction:column;justify-content:center;padding:16px 14px}

/* the matchday pass — a content-height object floating on the paper */
.pass{position:relative;display:flex;flex-direction:column;background:var(--card);box-shadow:0 14px 40px rgba(26,24,21,.22);animation:passArrive .7s cubic-bezier(.22,.9,.28,1) both}
@keyframes passArrive{from{transform:translateY(22px) scale(.986)}to{transform:none}}   /* the ticket settles onto the paper (transform-only → never hides the gate) */
@media(prefers-reduced-motion:reduce){.pass{animation:none}.nudge{animation:none}}
.mast .serial{color:var(--gold);font-weight:800;letter-spacing:.11em}
.pass::before{content:"";position:absolute;inset:7px;border:1.5px solid var(--ink);pointer-events:none;z-index:5}
.notch{position:absolute;width:14px;height:14px;background:var(--paper);border-radius:50%;z-index:6}
.notch.tl{top:-7px;left:-7px}.notch.tr{top:-7px;right:-7px}.notch.bl{bottom:-7px;left:-7px}.notch.br{bottom:-7px;right:-7px}
.hostband{display:flex;height:5px;margin:12px 12px 0}
.hostband i{flex:1}.hostband .v{background:var(--verde)}.hostband .r{background:var(--home)}.hostband .a{background:var(--away)}.hostband .g{background:var(--gold)}

/* masthead */
.mast{display:flex;align-items:baseline;justify-content:space-between;padding:11px 18px 2px}
.mast .brand{font-weight:900;font-size:16px;letter-spacing:.02em}
.mast .meta{font-weight:700;font-size:8px;letter-spacing:.17em;color:var(--sub);text-align:right;line-height:1.55}

/* step labels */
.lab{font-weight:800;font-size:9.5px;letter-spacing:.2em;color:var(--sub);padding:14px 18px 8px;text-transform:uppercase;display:flex;align-items:center}
.lab b{color:var(--ink);margin-left:.35em}
.lab .n{display:inline-flex;width:15px;height:15px;border:1.5px solid var(--sub);border-radius:50%;align-items:center;justify-content:center;font-size:9px;margin-right:9px;color:var(--sub)}

/* 1 — choose your side: two ends */
.ends{display:flex;margin:0 12px;border:1.5px solid var(--ink)}
.end{flex:1;padding:20px 10px 15px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;
  appearance:none;border:none;font-family:var(--disp);text-align:center;color:var(--ink);
  background:var(--card);transition:background .25s,color .25s,opacity .25s;-webkit-tap-highlight-color:transparent}
.end+.end{border-left:1.5px solid var(--ink)}
.end .flag{line-height:1}
/* generated sticker-badge */
.end .flag.tile{display:flex;align-items:center;justify-content:center}
.end .flag img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(1.5px 1.5px 0 rgba(26,24,21,.22))}
/* fallback: frame the unicode emoji as a tile so it rhymes with the sticker until that nation is drawn */
.end .flag:not(.tile){display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;font-size:27px;background:var(--paper);border:1.5px solid var(--ink);border-radius:4px;box-shadow:1.5px 1.5px 0 rgba(26,24,21,.2)}
.end .tri{font-weight:900;font-size:34px;line-height:.9;letter-spacing:.02em}
.end.h .tri{color:var(--home)}.end.a .tri{color:var(--away)}
.end .nm{font-weight:700;font-size:8.5px;letter-spacing:.15em;color:var(--sub)}
.end .join{font-weight:800;font-size:8px;letter-spacing:.14em;opacity:0;transition:opacity .2s;margin-top:1px}
.end.h.on{background:var(--home);color:var(--homeSeg,var(--card))}
.end.a.on{background:var(--away);color:var(--awaySeg,var(--ink))}
.end.on .tri,.end.on .nm{color:inherit}.end.on .nm{opacity:.85}.end.on .join{opacity:1;color:inherit}
.ends.picked .end:not(.on){opacity:.55}

/* 2 — predict: the scoreline + conviction */
.score{display:flex;align-items:flex-start;justify-content:center;gap:16px;margin:4px 12px 0}
.sc{display:flex;flex-direction:column;align-items:center;gap:5px}
.sc .sct{font-weight:800;font-size:9px;letter-spacing:.13em;color:var(--sub)}
.sc.h .sct{color:var(--home)}.sc.a .sct{color:var(--away)}
.scn{width:62px;height:62px;border:1.5px solid var(--ink);background:var(--card);font-family:var(--disp);font-weight:900;font-size:36px;line-height:1;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sc.h .scn{color:var(--home)}.sc.a .scn{color:var(--away)}
.scdash{font-weight:900;font-size:26px;color:var(--ink);align-self:center;transform:translateY(-4px)}
.schint{text-align:center;font-weight:700;font-size:7.5px;letter-spacing:.14em;color:var(--sub);margin-top:7px;transition:opacity .25s}
.schint.set{opacity:0}
.conv{display:flex;align-items:center;gap:11px;margin:13px 18px 0}
.conv .ct{font-weight:800;font-size:8.5px;letter-spacing:.15em;color:var(--sub);white-space:nowrap}
.conv .pips{display:flex;gap:5px;flex:1}
.conv .pip{flex:1;height:9px;padding:0;background:var(--card);border:1.5px solid var(--line);cursor:pointer;transition:background .15s,border-color .15s}
.conv .pip.on{background:var(--pick);border-color:var(--ink)}
.conv .cl{font-weight:800;font-size:8px;letter-spacing:.09em;color:var(--sub);white-space:nowrap;min-width:52px;text-align:right}
.end:focus-visible,.scn:focus-visible,.pip:focus-visible,.go:focus-visible{
  outline:2px solid var(--gold);outline-offset:2px;
}

/* market read — the number, kept beside, never blended into the crowd */
.mkt{margin:18px 18px 0;padding-top:12px;border-top:1px solid var(--line)}
.mkthd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.mkt .ml{font-weight:800;font-size:8px;letter-spacing:.16em;color:var(--gold)}
.mkt .mr{font-weight:700;font-size:7px;letter-spacing:.13em;color:var(--sub)}
.mbar{display:flex;height:24px;border:1.5px solid var(--ink)}
.mbar i{display:flex;align-items:center;justify-content:center;font-style:normal;font-weight:800;font-size:8.5px;letter-spacing:.04em;color:var(--card);overflow:hidden;white-space:nowrap}
.mbar i+i{border-left:1.5px solid var(--ink)}
.mbar .h{background:var(--home);color:var(--homeSeg,var(--card))}
.mbar .d{background:var(--oat);color:var(--ink)}
.mbar .a{background:var(--away);color:var(--awaySeg,var(--ink))}

/* confirm */
.go{margin:20px 12px 14px;padding:15px;background:var(--ink);color:var(--card);border:none;font-family:var(--disp);
  font-weight:900;font-size:13px;letter-spacing:.14em;cursor:pointer;opacity:.32;transition:opacity .28s}
.go.ready{opacity:1}
@keyframes nudge{30%{transform:translateX(-4px)}60%{transform:translateX(4px)}}
.nudge{animation:nudge .28s ease}
.go.ready:active{transform:translateY(1px)}
.go small{display:block;font-weight:700;font-size:7.5px;letter-spacing:.2em;opacity:.6;margin-top:3px}

/* THE TURNSTILE — your pass is stamped as you walk in (shown on confirm only; additive — never hides the gate) */
.stamp{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%) rotate(-11deg) scale(1.6);opacity:0;z-index:8;pointer-events:none;
  text-align:center;color:var(--verde);border:2.5px double var(--verde);border-radius:5px;padding:9px 20px;background:rgba(46,106,78,.05)}
.stamp b{font-weight:900;font-size:23px;letter-spacing:.11em;line-height:1;display:block}
.stamp span{font-weight:700;font-size:8px;letter-spacing:.17em;display:block;margin-top:3px;opacity:.82}
.stamp.on{animation:stampIn .5s cubic-bezier(.2,1.5,.4,1) forwards}
@keyframes stampIn{0%{opacity:0;transform:translate(-50%,-50%) rotate(-11deg) scale(1.7)}55%{opacity:.96;transform:translate(-50%,-50%) rotate(-11deg) scale(.93)}100%{opacity:.9;transform:translate(-50%,-50%) rotate(-11deg) scale(1)}}
@media (prefers-reduced-motion:reduce){.stamp.on{animation:none;opacity:.9;transform:translate(-50%,-50%) rotate(-11deg) scale(1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="pass">
    <span class="notch tl"></span><span class="notch tr"></span><span class="notch bl"></span><span class="notch br"></span>
    <div class="hostband"><i class="v"></i><i class="r"></i><i class="a"></i><i class="g"></i></div>
    <div class="mast">
      <div class="brand">ROOOT</div>
      <div class="meta">MATCHDAY · SUI v COL<br>KICK-OFF 20:00<br><b class="serial">ADMIT ONE · '26</b></div>
    </div>

    <div class="lab"><span class="n">1</span>CHOOSE YOUR<b>SIDE</b></div>
    <div class="ends" id="ends">
      <button class="end h" data-side="h" type="button">
        <div class="flag">🇨🇭</div><div class="tri">SUI</div><div class="nm">SWITZERLAND</div>
        <div class="join">◆ YOU'RE IN</div>
      </button>
      <button class="end a" data-side="a" type="button">
        <div class="flag">🇨🇴</div><div class="tri">COL</div><div class="nm">COLOMBIA</div>
        <div class="join">◆ YOU'RE IN</div>
      </button>
    </div>
    <div class="lab"><span class="n">2</span>PREDICT THE<b>SCORE</b></div>
    <div class="score" id="score">
      <div class="sc h"><div class="sct">SUI</div><button class="scn" data-t="h">0</button></div>
      <div class="scdash">–</div>
      <div class="sc a"><div class="sct">COL</div><button class="scn" data-t="a">0</button></div>
    </div>
    <div class="schint">TAP TO SET THE SCORE</div>
    <div class="conv">
      <span class="ct">HOW SURE?</span>
      <div class="pips" id="pips">
        <button class="pip" data-lv="1" type="button" aria-label="A hunch"></button><button class="pip" data-lv="2" type="button" aria-label="A lean"></button>
        <button class="pip" data-lv="3" type="button" aria-label="Confident"></button><button class="pip" data-lv="4" type="button" aria-label="Certain"></button>
      </div>
      <span class="cl" id="cl">—</span>
    </div>

    <div class="mkt">
      <div class="mkthd"><span class="ml">THE MARKET READS</span><span class="mr">SAMPLE · WIRES TO LIVE</span></div>
      <!-- sample proportions — wires from the live de-vigged odds feed -->
      <div class="mbar"><i class="h" style="flex:44">SUI 44</i><i class="d" style="flex:28">X 28</i><i class="a" style="flex:28">COL 28</i></div>
    </div>

    <button class="go" id="go">TAKE YOUR PLACE<small>THE GROUND OPENS →</small></button>
    <div class="stamp" id="stamp"><b>ADMITTED</b><span>SUI v COL · 20:00</span></div>
  </div>
</div>
<!-- demo engine — private prototype default: baked recording → serverless feed → window.__match + window.__stands -->
<script>if(/[?&]demo=1/.test(location.search))document.write('<scr'+'ipt src="plate/demo-suicol.js"></scr'+'ipt><scr'+'ipt src="demo-feed.js"></scr'+'ipt><scr'+'ipt src="match-read.js"></scr'+'ipt><scr'+'ipt src="crowd-sim.js"></scr'+'ipt>');</script>
<script src="stands-adapter.js"></script>
<script>
var side=null, sco={h:0,a:0}, touched=false, conv=0;
var PARAMS=new URLSearchParams(location.search);
var DEMO=PARAMS.get('demo')==='1', LIVE=PARAMS.get('live')==='1';
var explicitMatch=PARAMS.get('match');
var ends=document.getElementById('ends'),
    score=document.getElementById('score'), pips=document.getElementById('pips'),
    cl=document.getElementById('cl'), go=document.getElementById('go');
var CONVLBL={1:'A HUNCH',2:'A LEAN',3:'CONFIDENT',4:'CERTAIN'};
var FIXTURES={
  '18202783':{home:{tri:'SUI',name:'SWITZERLAND',color:'#D52B1E',flag:'SUI'},away:{tri:'COL',name:'COLOMBIA',color:'#E8B10A',flag:'COL'},kick:'20:00'},
  '18209181':{home:{tri:'FRA',name:'FRANCE',color:'#0055A4',flag:'FRA'},away:{tri:'MAR',name:'MOROCCO',color:'#C1272D',flag:'MOR'},kick:'LIVE NOW'},
  '18218149':{home:{tri:'ESP',name:'SPAIN',color:'#AA151B',flag:'SPA'},away:{tri:'BEL',name:'BELGIUM',color:'#1A1A18',flag:'BEL'},kick:'TONIGHT 21:00'}
};
// T16 — the __fixture manifest is the one truth; FIXTURES above is now only the
// explicit-?match lookup + the last-resort fallback (never invent a fixture). Asset-key
// exceptions (tri !== sticker filename) preserved from the table above; unknown teams
// default flag=code.
var FLAG_EXC={ESP:'SPA',MAR:'MOR'};
// masthead ink — the team's colour, darkened only if too light to read on the cream
// paper (mirrors woven-loom.html's mastInk pattern, e.g. tonight's ENG white). The
// literal FIXTURES table above is hand-picked and never needs this; only a
// manifest-derived colour can be arbitrarily light.
function mastInk(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var lum=(0.299*r+0.587*g+0.114*b)/255;
  if(lum<=0.55)return hex;
  var k=0.55/lum;
  function h2(n){ var s=Math.round(n*k).toString(16); return s.length<2?'0'+s:s; }
  return '#'+h2(r)+h2(g)+h2(b);
}
function kickLabel(kickoffUtc){
  try{
    var hm=new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/Madrid',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(kickoffUtc));
    return 'TONIGHT '+hm;
  }catch(e){ return 'TONIGHT'; }
}
function fromManifest(mf){
  return {
    home:{tri:mf.home.code,name:String(mf.home.name).toUpperCase(),color:mastInk(mf.home.colors[0]),flag:FLAG_EXC[mf.home.code]||mf.home.code},
    away:{tri:mf.away.code,name:String(mf.away.name).toUpperCase(),color:mastInk(mf.away.colors[0]),flag:FLAG_EXC[mf.away.code]||mf.away.code},
    kick:kickLabel(mf.kickoffUtc)
  };
}

function boot(MATCH_ID,FX){
var MODE_Q=DEMO?'&demo=1':(LIVE?'&live=1&match='+encodeURIComponent(MATCH_ID):'&demo=0');
var SIDECOL={h:FX.home.color,a:FX.away.color};

// flags: upgrade each end's flag to its generated sticker-badge if we have that nation;
// otherwise leave the unicode emoji already in the markup (graceful fallback — auto-fills as more are drawn)
var FLAGSET={ARG:1,BEL:1,COL:1,ENG:1,FRA:1,MOR:1,NOR:1,SPA:1,SUI:1};
function paintFixture(){
  document.documentElement.style.setProperty('--home',FX.home.color);
  document.documentElement.style.setProperty('--away',FX.away.color);
  // segment type must contrast its team ground (§C-7) — near-ink teams (BEL) get cream, light teams (COL) keep ink
  var segInk=function(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return (0.2126*r+0.7152*g+0.0722*b)<140?'var(--card)':'var(--ink)';};
  document.documentElement.style.setProperty('--homeSeg',segInk(FX.home.color));
  document.documentElement.style.setProperty('--awaySeg',segInk(FX.away.color));
  var meta=document.querySelector('.mast .meta');
  if(meta)meta.innerHTML='MATCHDAY · '+FX.home.tri+' v '+FX.away.tri+'<br>'+FX.kick+'<br><b class="serial">ADMIT ONE · &#39;26</b>';
  var es=ends.children;
  [[es[0],FX.home],[es[1],FX.away]].forEach(function(pair){
    var node=pair[0], team=pair[1], flag=team.flag||team.tri;
    if(!node)return;
    node.querySelector('.tri').textContent=team.tri;
    node.querySelector('.nm').textContent=team.name;
    var f=node.querySelector('.flag');
    if(f&&FLAGSET[flag]){ f.classList.add('tile'); f.innerHTML='<img src="plate/gens/flags/'+flag+'.png" alt="'+team.tri+'">'; }
  });
  [].forEach.call(score.querySelectorAll('.sct'),function(n,i){ n.textContent=i?FX.away.tri:FX.home.tri; });
  var st=document.querySelector('.stamp span'); if(st)st.textContent=FX.home.tri+' v '+FX.away.tri+' · '+FX.kick;
  if(LIVE){
    var mr=document.querySelector('.mkt .mr'); if(mr)mr.textContent='LIVE WIRE · WAITING';
    // no sample numbers on the live door — one plain fact until the wire prints (owner, 10 Jul: KISS)
    var kt=(FX.kick||'').match(/\d{1,2}:\d{2}/);
    var bar=document.querySelector('.mbar'); if(bar)bar.innerHTML='<i class="d" style="flex:100">'+(kt?'GAME STARTS AT '+kt[0]:FX.kick||'PRE-MATCH')+'</i>';
  }
}
paintFixture();
[].forEach.call(document.querySelectorAll('.end'),function(end){
  var t=end.querySelector('.tri'), f=end.querySelector('.flag');
  var tri=t?t.textContent.trim():''; if(!f||!FLAGSET[tri])return;
  f.classList.add('tile'); f.innerHTML='<img src="plate/gens/flags/'+tri+'.png" alt="'+tri+'">';
});

function paintMarketTriple(m){
  if(!m)return;
  var h=Math.max(1,Math.round(m.home*100)), d=Math.max(1,Math.round(m.draw*100)), a=Math.max(1,Math.round(m.away*100));
  var bar=document.querySelector('.mbar');
  if(bar)bar.innerHTML='<i class="h" style="flex:'+h+'">'+FX.home.tri+' '+h+'</i><i class="d" style="flex:'+d+'">X '+d+'</i><i class="a" style="flex:'+a+'">'+FX.away.tri+' '+a+'</i>';
  var mr=document.querySelector('.mkt .mr'); if(mr)mr.textContent=LIVE?'LIVE · DE-VIGGED':'PRE-MATCH · DE-VIGGED';
}
function wireLiveGate(){
  if(!LIVE)return true;
  if(!window.__stands)return false;
  if(window.__stands.onMarket)window.__stands.onMarket(paintMarketTriple);
  return true;
}
if(LIVE&&!wireLiveGate()){ var _liveGate=setInterval(function(){ if(wireLiveGate())clearInterval(_liveGate); },120); }

function ready(){ if(side && touched) go.classList.add('ready'); }

// ?demo=1 — the market bar reads the real de-vigged 1X2 from window.__match (no longer sample)
function paintMarket(m){ if(!m||!m.market)return; var mk=m.market, t=m.teams||{};
  var h=Math.round(mk.home*100), d=Math.round(mk.draw*100), a=Math.round(mk.away*100);
  var hn=(t.home&&t.home.tri)||'SUI', an=(t.away&&t.away.tri)||'COL';
  var bar=document.querySelector('.mbar');
  bar.innerHTML='<i class="h" style="flex:'+h+'">'+hn+' '+h+'</i><i class="d" style="flex:'+d+'">X '+d+'</i><i class="a" style="flex:'+a+'">'+an+' '+a+'</i>';
  var mr=document.querySelector('.mr'); if(mr)mr.textContent='PRE-MATCH · DE-VIGGED';
}
if(DEMO&&window.__match){ paintMarket(window.__match); if(window.__match.on)window.__match.on(paintMarket); }

[].forEach.call(ends.children,function(el){
  el.onclick=function(){
    side=el.dataset.side;
    ends.classList.add('picked');
    [].forEach.call(ends.children,function(e){e.classList.toggle('on',e===el);});
    document.documentElement.style.setProperty('--pick',SIDECOL[side]);
    ready();
  };
});
function paintScore(){ [].forEach.call(score.querySelectorAll('.scn'),function(n){ n.textContent=sco[n.dataset.t]; }); if(touched){var sh=document.querySelector('.schint'); if(sh)sh.classList.add('set');} }
[].forEach.call(score.querySelectorAll('.scn'),function(n){ n.onclick=function(){ sco[n.dataset.t]=(sco[n.dataset.t]+1)%10; touched=true; paintScore(); ready(); }; });   // tap cycles 0→9→0 (owner D1: tap only, − dies)
[].forEach.call(pips.children,function(el){
  el.onclick=function(){
    conv=+el.dataset.lv;
    [].forEach.call(pips.children,function(e){e.classList.toggle('on',+e.dataset.lv<=conv);});
    cl.textContent=CONVLBL[conv]||'—';
  };
});
go.onclick=function(){
  if(!go.classList.contains('ready')){
    var need=!side?ends:score;   // the first unfinished step shakes — feedback, not an error
    need.classList.remove('nudge'); void need.offsetWidth; need.classList.add('nudge');
    return;
  }
  // your pass — persisted, then read by the terrace checkpoint + woven into the keepsakes
  try{ localStorage.setItem('rooot.pass', JSON.stringify({matchId:MATCH_ID, home:FX.home.tri, away:FX.away.tri, side:side, call:sco, conv:conv, ts:Date.now(), live:LIVE})); }catch(e){}
  if((DEMO||LIVE)&&window.__stands){ if(side&&side!=='n')window.__stands.root(side==='h'?'home':'away'); window.__stands.predict(sco.h,sco.a); }   // your seat + call into the live crowd
  document.getElementById('stamp').classList.add('on');   // the turnstile presses your pass — ADMITTED
  go.innerHTML='SEE YOU INSIDE<small>◆ YOU CALLED '+FX.home.tri+' '+sco.h+'–'+sco.a+' '+FX.away.tri+'</small>';
  setTimeout(function(){ location.href='ground.html?from=gate'+MODE_Q; }, 1050);   // the tunnel — walk into the ground (carry prototype mode)
};
} // end boot

// T16 fixture resolution: explicit ?match= wins outright (unchanged — literal-table
// lookup, no async wait) → else, on a live route, the __fixture manifest (raced
// against a ~1500ms timeout, same idiom as stands-adapter.js, so a hung fetch never
// blocks the gate) → else today's literal default (never invent a fixture; fetch-fail
// is exactly today's behavior). A live explicit ?match= that isn't one of the literal
// entries (e.g. ground forwarding this page's own manifest-resolved id back in) still
// checks the manifest before giving up, so gate→ground→lens never shows a mismatched
// fixture once any one surface has resolved the real one.
if(explicitMatch&&FIXTURES[explicitMatch]){
  boot(explicitMatch,FIXTURES[explicitMatch]);
}else if(!LIVE){
  var mid=explicitMatch||'18202783';
  boot(mid,FIXTURES[mid]||FIXTURES['18218149']);
}else{
  var done=false, fallbackId=explicitMatch||'18218149';
  function finish(id,fx){ if(done)return; done=true; boot(id,fx); }
  window.__fixtureReady=window.__fixtureReady||fetch('/fixture.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});

    if(mf&&mf.matchId&&mf.home&&mf.away&&(!explicitMatch||explicitMatch===mf.matchId)){ finish(mf.matchId,fromManifest(mf)); }
    else{ finish(fallbackId,FIXTURES['18218149']); }
  },function(){ finish(fallbackId,FIXTURES['18218149']); });
  setTimeout(function(){ finish(fallbackId,FIXTURES['18218149']); },1500);
}
